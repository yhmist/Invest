    <style>
        :root {
            --bg: #f5efe7;
            --bg-deep: #ebe4db;
            --surface: #fffdf8;
            --surface-muted: #f8f3ec;
            --ink: #26231e;
            --text: #26231e;
            --text-muted: #6b6560;
            --text-subtle: #8a8177;
            --border: #26231e;
            --border-soft: rgba(38, 35, 30, 0.13);
            --accent: #97d4ff;
            --accent-deep: #6fc2ff;
            --yellow: #ffd900;
            --orange: #ff9538;
            --pos: #0f8a3d;
            --neg: #d61f45;
            --radius: 12px;
            --shadow: none;
            --font-display: 'Inter', system-ui, sans-serif;
            --font-mono: 'Inter', system-ui, sans-serif;
            --font-fono: 'Inter', system-ui, sans-serif;
            --font-weight-body: 400;
            --font-weight-strong: 600;
            --letter-spacing-body: 0.01em;
            --letter-spacing-wide: 0.08em;
            --plan-action-w: 2.25rem;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: var(--font-mono);
            font-weight: var(--font-weight-body);
            font-optical-sizing: auto;
            letter-spacing: var(--letter-spacing-body);
            background:
                radial-gradient(circle at 12% 8%, rgba(151, 212, 255, 0.28), transparent 28%),
                radial-gradient(circle at 88% 0%, rgba(255, 222, 0, 0.22), transparent 24%),
                radial-gradient(circle at 80% 70%, rgba(255, 149, 56, 0.12), transparent 30%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .page { max-width: 1080px; margin: 0 auto; padding: 1.75rem 1.5rem 4.5rem; }
        .font-display {
            font-family: var(--font-display);
            font-weight: var(--font-weight-strong);
            letter-spacing: var(--letter-spacing-wide);
            text-transform: uppercase;
        }
        .font-mono { font-family: var(--font-mono); font-weight: var(--font-weight-body); }
        .font-medium { font-weight: 500; }
        .font-semibold, strong, b { font-weight: 600; }
        .signals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        @media (min-width: 640px) { .signals-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .signals-grid { grid-template-columns: repeat(5, 1fr); } }
        .month-cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        @media (min-width: 640px) { .month-cards-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .month-cards-grid { grid-template-columns: repeat(3, 1fr); } }
        .top-banner { display: none; }
        .site-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0 0 1.35rem;
            margin-bottom: 1.25rem;
            border-bottom: none;
        }
        .hero-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .hero-stat {
            background: var(--surface);
            border: 2px solid var(--ink);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1rem 1.1rem;
        }
        .hero-stat-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-subtle);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            line-height: 1.2;
        }
        .hero-stat-value {
            margin-top: 0.35rem;
            font-family: var(--font-mono);
            font-size: 1.85rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        /* ===== Position Plan (on-demand drawer) ===== */
        .plan-fab {
            position: fixed;
            right: 1.25rem;
            bottom: 1.25rem;
            z-index: 40;
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.7rem 1rem;
            border: 2px solid var(--ink);
            border-radius: 999px;
            background: var(--surface);
            color: var(--ink);
            font-family: var(--font-mono);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            box-shadow: var(--shadow);
        }
        .plan-fab:hover { background: var(--yellow); }
        .plan-fab-badge {
            display: none;
            align-items: center;
            justify-content: center;
            min-width: 2.6rem;
            padding: 0.2rem 0.45rem;
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            line-height: 1;
        }
        .plan-fab-badge.is-on { display: inline-flex; }
        .plan-fab-badge.plan-badge-add { background: var(--pos); color: #fff; }
        .plan-fab-badge.plan-badge-hold { background: var(--accent); color: var(--ink); }
        .plan-fab-badge.plan-badge-wait { background: var(--yellow); color: var(--ink); }
        .plan-fab-badge.plan-badge-stop { background: var(--neg); color: #fff; }
        .plan-drawer-root {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
        }
        .plan-drawer-root.is-open,
        .plan-drawer-root.is-open[hidden] {
            display: block;
            /* override UA [hidden] { display:none !important } when opening */
        }
        .plan-drawer-root.is-open { display: block !important; }
        .plan-drawer-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(56, 56, 56, 0.28);
        }
        .plan-drawer {
            position: absolute;
            top: 0;
            right: 0;
            width: min(440px, 100%);
            height: 100%;
            background: var(--surface);
            border-left: 1.5px solid var(--ink);
            display: flex;
            flex-direction: column;
            box-shadow: none;
        }
        .plan-drawer-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.15rem;
            border-bottom: 1.5px solid var(--ink);
            flex-shrink: 0;
        }
        .plan-drawer-title {
            margin: 0;
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: var(--letter-spacing-wide);
            text-transform: uppercase;
        }
        .plan-drawer-close {
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.35rem 0.65rem;
            cursor: pointer;
        }
        .plan-drawer-close:hover { background: var(--surface-muted); }
        .plan-drawer-body {
            overflow: auto;
            flex: 1;
            padding: 0;
        }
        .plan-panel { background: var(--surface); }
        .plan-form {
            padding: 1rem 1.15rem 1.15rem;
            border-top: 1.5px solid var(--ink);
        }
        .plan-form-head {
            margin-bottom: 0.75rem;
        }
        .plan-form-title {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--ink);
        }
        .plan-form-hint {
            margin-top: 0.2rem;
            font-size: 0.7rem;
            color: var(--text-subtle);
            line-height: 1.4;
        }
        /* Shared 2-field + action-slot grid so settings align with deposit rows */
        .plan-cols {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) var(--plan-action-w);
            gap: 0.55rem;
            align-items: end;
        }
        .plan-cols-action {
            width: var(--plan-action-w);
            height: 2.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .plan-cols-action.is-spacer {
            visibility: hidden;
            pointer-events: none;
            border: none;
            padding: 0;
        }
        .plan-deposits-head {
            margin: 1rem 0 0.5rem;
        }
        .plan-deposits-title {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--ink);
        }
        .plan-deposits-hint {
            margin-top: 0.2rem;
            font-size: 0.7rem;
            color: var(--text-subtle);
            line-height: 1.4;
        }
        .plan-deposits {
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }
        .plan-deposits-empty {
            font-size: 0.82rem;
            color: var(--text-muted);
            padding: 0.35rem 0;
        }
        .plan-dep-remove {
            width: var(--plan-action-w);
            height: 2.25rem;
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            padding: 0;
        }
        .plan-dep-remove:hover { background: var(--neg); color: #fff; }
        .plan-est {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0 0 0.85rem;
            line-height: 1.45;
        }
        .plan-est strong { color: var(--ink); font-weight: 600; }
        .plan-field {
            display: flex;
            flex-direction: column;
            gap: 0.28rem;
            min-width: 0;
        }
        .plan-field-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--text-subtle);
            line-height: 1.2;
        }
        .plan-field input {
            width: 100%;
            height: 2.25rem;
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            padding: 0 0.6rem;
            line-height: 1.2;
        }
        .plan-field input:focus {
            outline: 2px solid var(--accent-deep);
            outline-offset: 1px;
        }
        .plan-form-actions {
            margin-top: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .plan-add-btn,
        .plan-reset-btn {
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.4rem 0.7rem;
            cursor: pointer;
        }
        .plan-add-btn:hover { background: var(--accent); }
        .plan-reset-btn:hover { background: var(--yellow); }
        .plan-verdict {
            display: flex;
            align-items: flex-start;
            gap: 0.85rem;
            padding: 1.05rem 1.15rem;
            border-bottom: 1.5px solid var(--ink);
            background: var(--surface);
        }
        .plan-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            min-width: 3.6rem;
            padding: 0.45rem 0.55rem;
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: var(--letter-spacing-wide);
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
        }
        .plan-badge-add { background: var(--pos); color: #fff; }
        .plan-badge-hold { background: var(--accent); color: var(--ink); }
        .plan-badge-wait { background: var(--yellow); color: var(--ink); }
        .plan-badge-stop { background: var(--neg); color: #fff; }
        .plan-verdict-text { min-width: 0; }
        .plan-headline {
            font-family: var(--font-mono);
            font-size: 1.02rem;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.3;
        }
        .plan-reason {
            margin-top: 0.3rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.45;
        }
        .plan-body { padding: 1rem 1.15rem 1.2rem; }
        .plan-next {
            font-size: 0.85rem;
            color: var(--ink);
            line-height: 1.5;
            margin-bottom: 0.85rem;
        }
        .plan-next strong { font-weight: 600; }
        .plan-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.55rem;
            margin-bottom: 0.9rem;
        }
        .plan-stat {
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 0.55rem 0.6rem;
            background: var(--surface-muted);
        }
        .plan-stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--text-subtle);
            line-height: 1.2;
        }
        .plan-stat-value {
            margin-top: 0.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: var(--ink);
            line-height: 1.15;
        }
        .plan-fund-bar {
            height: 0.4rem;
            border: 1px solid var(--ink);
            border-radius: 999px;
            background: var(--surface-muted);
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .plan-fund-fill { height: 100%; background: var(--pos); }
        .plan-checks-title {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-subtle);
            margin-bottom: 0.45rem;
        }
        .plan-check {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.35rem 0;
            border-bottom: 1px solid var(--border-soft);
            font-size: 0.78rem;
            line-height: 1.4;
        }
        .plan-check:last-child { border-bottom: none; }
        .plan-check-icon {
            flex-shrink: 0;
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            border: 1.5px solid var(--ink);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            line-height: 1;
            margin-top: 0.1rem;
        }
        .plan-check-ok .plan-check-icon { background: var(--pos); color: #fff; }
        .plan-check-bad .plan-check-icon { background: var(--neg); color: #fff; }
        .plan-check-label { font-weight: 500; color: var(--ink); }
        .plan-check-detail { color: var(--text-muted); }
        .plan-foot {
            margin-top: 0.85rem;
            font-size: 0.68rem;
            color: var(--text-subtle);
            line-height: 1.5;
        }
        body.plan-drawer-open { overflow: hidden; }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .brand-text { display: flex; flex-direction: column; gap: 0.15rem; }
        .brand-name {
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: var(--letter-spacing-wide);
            color: var(--ink);
            line-height: 1;
            text-transform: uppercase;
        }
        .brand-tagline {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-subtle);
            letter-spacing: 0.02em;
            line-height: 1.2;
        }
        .date-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--ink);
            background: var(--yellow);
            border: 2px solid var(--ink);
            border-radius: 999px;
            box-shadow: none;
            padding: 0.45rem 0.85rem;
            white-space: nowrap;
            line-height: 1;
        }
        .panel {
            background: var(--surface);
            border: 2px solid var(--ink);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .panel-padded { padding: 1.35rem 1.4rem; }
        .section-block { margin-bottom: 2.25rem; }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 1rem;
        }
        .section-title {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            font-family: var(--font-mono);
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.02em;
            text-transform: none;
            line-height: 1.2;
        }
        .section-title::before {
            content: '';
            display: block;
            width: 0.55rem;
            height: 0.55rem;
            background: var(--accent);
            border: 2px solid var(--ink);
            border-radius: 3px;
            flex-shrink: 0;
        }
        .section-subtitle {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--ink);
            text-transform: none;
            letter-spacing: 0.02em;
            margin-bottom: 0.85rem;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.85rem;
        }
        @media (min-width: 768px) { .metric-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .metric-grid.performance-grid { grid-template-columns: repeat(4, 1fr); } }
        .metric-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--surface);
            border: 2px solid var(--ink);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1rem 1.05rem;
            min-height: 5.25rem;
            transition: transform 0.12s ease;
        }
        .metric-card.is-featured {
            background: linear-gradient(180deg, #fffdf8 0%, #f8f3ec 100%);
        }
        .metric-card.is-featured .metric-value {
            font-size: 1.75rem;
            font-weight: 800;
        }
        .metric-label {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1.25;
        }
        .metric-value {
            margin-top: 0.5rem;
            font-family: var(--font-mono);
            font-size: 1.45rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.01em;
            line-height: 1.15;
            color: var(--ink);
        }
        #signals-container .metric-card {
            min-height: 4.5rem;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #signals-container .metric-value {
            margin-top: 0;
            font-size: 1.35rem;
            font-weight: 800;
        }
        .val-pos { color: var(--pos); }
        .val-neg { color: var(--neg); }
        .val-neutral { color: var(--text-muted); }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }
        .data-table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }
        .data-table th {
            text-align: left;
            padding: 0.7rem 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            border-bottom: 1.5px solid var(--ink);
            background: var(--surface-muted);
            white-space: nowrap;
            vertical-align: middle;
            line-height: 1.2;
        }
        .data-table th:not(:first-child) { text-align: right; }
        .data-table td {
            padding: 0.8rem 0.75rem;
            border-bottom: 1px solid var(--border-soft);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            vertical-align: middle;
            line-height: 1.2;
        }
        .data-table td:not(:first-child) { text-align: right; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tbody tr:hover { background: rgba(151, 212, 255, 0.14); }
        .data-table tbody tr.is-strategy td {
            background: rgba(255, 217, 0, 0.18);
        }
        .data-table tbody tr.is-strategy:hover td {
            background: rgba(255, 217, 0, 0.28);
        }
        .data-table th:first-child,
        .data-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 1;
            width: 1%;
            max-width: 7.5rem;
            background: var(--surface);
            box-shadow: 1px 0 0 var(--border-soft);
        }
        .data-table thead th:first-child { background: var(--surface-muted); z-index: 2; }
        .data-table tbody tr:hover td:first-child { background: #e8f5ff; }
        /* Compact holdings book: no sticky overlay, ticker fits content */
        .holdings-table { min-width: 0; table-layout: auto; }
        .holdings-table th:first-child,
        .holdings-table td:first-child {

    <script>
    // Frontend logic: render dynamic content from #report-data and init charts.
const DATA = JSON.parse(document.getElementById('report-data').textContent);

const annualReturns = DATA.annual_returns;
const chartColors = DATA.colors_map;
const defaultYear = DATA.default_year;
const STRATEGY_KEY = 'Strategy';

/** Expand compact {times, series:{name:[y...]}} into per-series point maps. */
function expandSharedSeries(raw) {
    if (!raw || !raw.times || !raw.series) return {};
    const out = {};
    Object.keys(raw.series).forEach(name => {
        const ys = raw.series[name] || [];
        out[name] = raw.times.map((t, i) => ({ time: t, value: ys[i] }));
    });
    return out;
}

const tvEquityData = expandSharedSeries(DATA.tv_equity_series);
const tvDrawdownSeries = expandSharedSeries(DATA.tv_drawdown_series);
const tvReturnDistData = DATA.tv_return_dist_data;
const tvCurrentMonthCurve = DATA.tv_current_month_curve;

/** Unpack holding row: [ticker, buy, sell, ret, score]. */
function holdingFields(d) {
    return {
        ticker: d[0],
        buy_price: Number(d[1]) || 0,
        sell_price: Number(d[2]) || 0,
        monthly_return: Number(d[3]) || 0,
        total_score: Number(d[4]) || 0,
    };
}

function monthYear(m) {
    return m.year || (m.month ? String(m.month).slice(0, 4) : '');
}

// ===== Number formatting (matches former Python _fmt_pct) =====
function fmtPct(v, digits = 1) {
    return (v * 100).toFixed(digits) + '%';
}

function fmtSignedPct(v, digits = 2) {
    const pct = v * 100;
    return (pct >= 0 ? '+' : '') + pct.toFixed(digits) + '%';
}

function formatKpiValue(k) {
    const v = k.value;
    if (k.format === 'number') return Number(v).toFixed(2);
    if (k.format === 'pct0') return fmtPct(v, 0);
    return fmtPct(v, 1);
}

function kpiColorClass(k) {
    const label = k.label || '';
    const v = Number(k.value);
    if (label.startsWith('Max drawdown') || label.startsWith('Worst month') || v < 0) {
        return 'val-neg';
    }
    if (label === 'Volatility') return 'val-neutral';
    if (label === 'Sharpe' || label === 'Sortino') {
        return v >= 1 ? 'val-pos' : 'val-neg';
    }
    return 'val-pos';
}

// ===== Position Plan (interactive top verdict panel) =====
const PLAN_STORAGE_KEY = 'sp_live_plan_v2';

function planFmtUsd(v) {
    return '$' + Number(v || 0).toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function planFmtSignedPct1(v) {
    if (v == null || Number.isNaN(v)) return '—';
    return (v * 100 >= 0 ? '+' : '') + (v * 100).toFixed(1) + '%';
}

function planBadgeMeta(action) {

        HOLD: 'plan-badge-hold',
        WAIT: 'plan-badge-wait',

    const text = {
        ADD: '加仓', HOLD: '保持', WAIT: '观望', STOP: '止损',
    }[action] || action;
    return { cls, text };
}

function updatePlanFab(plan) {

function setPlanDrawerOpen(open) {

function bindPlanDrawer() {

function defaultPlanDeposits(defaults) {
    const d = defaults || {};
    if (Array.isArray(d.deposits) && d.deposits.length) {
        return d.deposits.map(x => ({
            month: String(x.month || '').slice(0, 7),
            amount: Math.max(0, Number(x.amount) || 0),
        }));
    }
    return [{
        month: String(d.start_month || '').slice(0, 7),
        amount: Math.max(0, Number(d.invested) || 0),
    }];
}

function normalizePlanInputs(raw, defaults) {
    const d = defaults || {};
    let deposits;
    if (Array.isArray(raw.deposits) && raw.deposits.length) {
        deposits = raw.deposits.map(x => ({
            month: String(x.month || '').slice(0, 7),
            amount: Math.max(0, Number(x.amount) || 0),
        })).filter(x => /^\d{4}-\d{2}$/.test(x.month));
    } else if (raw.invested != null || raw.start_month) {
        // migrate v1: single invested + start_month
        deposits = [{
            month: String(raw.start_month || d.start_month || '').slice(0, 7),
            amount: Math.max(0, Number(raw.invested) || 0),
        }].filter(x => /^\d{4}-\d{2}$/.test(x.month));
    }
    if (!deposits || !deposits.length) deposits = defaultPlanDeposits(d);
    deposits.sort((a, b) => a.month.localeCompare(b.month));
    return {
        cap: Math.max(0, Number(raw.cap ?? d.cap) || 0),
        tranche: Math.max(0, Number(raw.tranche ?? d.tranche) || 0),
        deposits,
    };
}

function loadPlanInputs() {
    const defaults = (DATA.position_plan && DATA.position_plan.defaults) || {};
    let saved = null;
    try {
        saved = JSON.parse(localStorage.getItem(PLAN_STORAGE_KEY) || 'null');
        if (!saved) {
            saved = JSON.parse(localStorage.getItem('sp_live_plan_v1') || 'null');
        }
    } catch (_) {
        saved = null;
    }
    return normalizePlanInputs(saved && typeof saved === 'object' ? saved : defaults, defaults);
}

function savePlanInputs(inputs) {
    try {
        localStorage.setItem(PLAN_STORAGE_KEY, JSON.stringify(inputs));
    } catch (_) { /* private mode / quota */ }
}

function readPlanInputsFromForm(container) {
    const defaults = (DATA.position_plan && DATA.position_plan.defaults) || {};
    const cap = Number(container.querySelector('#plan-cap')?.value);
    const tranche = Number(container.querySelector('#plan-tranche')?.value);
    const deposits = [];
    container.querySelectorAll('.plan-deposit-row').forEach(row => {
        const month = String(row.querySelector('.plan-dep-month')?.value || '').trim();
        const amount = Number(row.querySelector('.plan-dep-amount')?.value);
        if (/^\d{4}-\d{2}$/.test(month)) {
            deposits.push({
                month,
                amount: Number.isFinite(amount) ? Math.max(0, amount) : 0,
            });
        }
    });
    return normalizePlanInputs({
        cap: Number.isFinite(cap) ? cap : defaults.cap,
        tranche: Number.isFinite(tranche) ? tranche : defaults.tranche,
        deposits,
    }, defaults);
}

function depositRowsHtml(deposits) {

        </div>

}

function computeMoneyWeighted(deposits, monthlyData) {
    const start = deposits.length ? deposits.map(d => d.month).sort()[0] : '';
    const byMonth = {};
    for (const d of deposits) {
        byMonth[d.month] = (byMonth[d.month] || 0) + d.amount;
    }
    const months = (monthlyData || [])
        .map(m => m.month)
        .filter(m => m >= start);
    for (const m of Object.keys(byMonth)) {
        if (m >= start && !months.includes(m)) months.push(m);
    }
    months.sort();

    const retMap = {};
    for (const m of (monthlyData || [])) retMap[m.month] = Number(m.monthly_return) || 0;

    let portfolio = 0;
    let invested = 0;
    for (const month of months) {
        const add = byMonth[month] || 0;
        if (add) {
            portfolio += add;
            invested += add;
        }
        if (portfolio <= 0) continue;
        if (Object.prototype.hasOwnProperty.call(retMap, month)) {
            portfolio *= (1 + retMap[month]);
        }
    }
    const personalReturn = invested > 0 ? portfolio / invested - 1 : 0;
    return { invested, estValue: portfolio, personalReturn, start };
}

function computePositionPlan(inputs) {
    const meta = DATA.position_plan || {};
    const t = meta.thresholds || {};
    const ctx = meta.context || {};
    const bmMap = meta.bm_returns || {};
    const bmName = ctx.benchmark || 'SPY';
    const deposits = (inputs.deposits || []).filter(d => d.amount > 0 && /^\d{4}-\d{2}$/.test(d.month));
    const mw = computeMoneyWeighted(deposits, DATA.monthly_data || []);
    const start = mw.start || '';

    // 策略健康：从首笔入金月起的时间加权收益（与入金节奏无关）
    const liveRows = (DATA.monthly_data || []).filter(m => m.month >= start);
    const liveRets = liveRows.map(m => Number(m.monthly_return) || 0);
    const nLive = liveRows.length;

    let liveEquity = 1;
    for (const r of liveRets) liveEquity *= (1 + r);
    const strategyReturn = liveEquity - 1;

    let eq = 1;
    let peak = 1;
    let maxDd = 0;
    for (const r of liveRets) {
        eq *= (1 + r);
        peak = Math.max(peak, eq);
        maxDd = Math.min(maxDd, eq / peak - 1);
    }

    const spyRets = [];
    for (const m of liveRows) {
        if (Object.prototype.hasOwnProperty.call(bmMap, m.month) && bmMap[m.month] != null) {
            spyRets.push(Number(bmMap[m.month]));
        }
    }
    let spyTotalReturn = null;
    if (spyRets.length > 0) {
        spyTotalReturn = spyRets.reduce((acc, r) => acc * (1 + r), 1) - 1;
    }
    const relSpy = spyTotalReturn == null ? null : strategyReturn - spyTotalReturn;

    const invested = mw.invested;
    const cap = inputs.cap;
    const tranche = inputs.tranche;
    const roomLeft = Math.max(0, cap - invested);
    const isFull = tranche > 0 ? roomLeft < tranche * 0.5 : roomLeft <= 0;
    const estValue = mw.estValue;
    const personalReturn = mw.personalReturn;
    const strategyOn = !!ctx.strategy_on;
    const inBear = !!ctx.in_bear_market;

    const warnDd = t.warn_drawdown ?? -0.25;
    const stopDd = t.stop_drawdown ?? -0.40;
    const stopMinMonths = t.stop_min_months ?? 6;
    const stopLiveRet = t.stop_live_return ?? -0.20;
    const stopRelSpy = t.stop_rel_spy ?? -0.15;

    const checks = [];
    checks.push({
        label: '策略在场（非熊市保护、有可买标的）',
        ok: strategyOn,
        detail: strategyOn
            ? 'QQQ 50/200MA 未触发熊市，下期有可买标的'
            : '熊市保护触发或无可选股时应持现金、不加仓',
    });
    const ddOk = maxDd > warnDd;
    checks.push({
        label: `策略回撤未破警戒线（${(warnDd * 100).toFixed(0)}%）`,
        ok: ddOk,
        detail: `自 ${start || '—'} 起策略峰值回撤 ${(maxDd * 100).toFixed(1)}%`,
    });
    if (relSpy != null) {
        const relOk = !(nLive >= stopMinMonths && strategyReturn < stopLiveRet && relSpy < stopRelSpy);
        checks.push({
            label: `未出现「长期跑输且亏损」（≥${stopMinMonths}月起判定）`,
            ok: relOk,
            detail: `策略 ${planFmtSignedPct1(strategyReturn)} vs ${bmName} ${planFmtSignedPct1(spyTotalReturn)}`
                + `（相对 ${planFmtSignedPct1(relSpy)}），已跟踪 ${nLive} 个月`,
        });
    }

    const stopByDd = maxDd <= stopDd;
    const stopByUnderperf = (
        relSpy != null
        && nLive >= stopMinMonths
        && strategyReturn < stopLiveRet
        && relSpy < stopRelSpy
    );

    let action, headline, reason, nextStep;
    if (!deposits.length) {
        action = 'HOLD';
        headline = '先填写入金记录';
        reason = '还没有有效入金。按实际投入月份各记一笔，例如六月 $2000、七月 $2000。';
        nextStep = '在上方「入金记录」里添加每笔投入的月份和金额。';
    } else if (stopByDd || stopByUnderperf) {
        action = 'STOP';
        headline = '止损：策略疑似失效';
        if (stopByDd) {
            reason = `策略回撤 ${(maxDd * 100).toFixed(1)}% 已跌破止损线 ${(stopDd * 100).toFixed(0)}%，进入历史未见的恶劣区间。`;
        } else {
            reason = `已跟踪 ${nLive} 个月，策略累计 ${planFmtSignedPct1(strategyReturn)} 且相对 ${bmName} 落后 `
                + `${planFmtSignedPct1(relSpy)}，动量优势未兑现。`;
        }
        nextStep = '分批赎回、回到现金，暂停该策略；复盘信号与执行是否与回测一致后再决定是否重启。';
    } else if (inBear) {
        action = 'WAIT';
        headline = '观望：熊市保护中';
        reason = 'QQQ 50MA 已跌破 200MA，策略本月持现金。此时不加仓，也不因空仓恐慌离场。';
        nextStep = '保持现金仓位，等待熊市保护解除（50MA 重新上穿 200MA）再恢复加仓节奏。';
    } else if (!ddOk) {
        action = 'WAIT';
        headline = '观望：回撤接近历史极值';
        reason = `策略回撤 ${(maxDd * 100).toFixed(1)}% 已破警戒线 ${(warnDd * 100).toFixed(0)}%（接近回测极值 -33.5%），暂停加仓。`;
        nextStep = '维持现有仓位不动。回撤收窄回到警戒线以内再考虑加仓；继续恶化到止损线才离场。';
    } else if (isFull) {
        action = 'HOLD';
        headline = '保持：已到资金上限';
        reason = `已投入 ${planFmtUsd(invested)}，达到计划上限 ${planFmtUsd(cap)}，无空闲额度可加。`;
        nextStep = '按策略信号每月正常换仓，维持仓位，不再追加本金。';
    } else if (strategyOn) {
        action = 'ADD';
        headline = '可以加仓';
        reason = `策略在场、健康检查全部通过，且仍有额度（已投 ${planFmtUsd(invested)} / 上限 ${planFmtUsd(cap)}）。`;
        nextStep = `在下一个开盘日按信号买入时，追加一档 ${planFmtUsd(tranche)}（加满后剩余额度 ${planFmtUsd(Math.max(0, roomLeft - tranche))}）。加仓后请在入金记录里补上新的一笔。`;
    } else {
        action = 'HOLD';
        headline = '保持：持仓不动';
        reason = '策略当前无新的可买标的（多为持现金过渡），但也未触发任何风险线。';
        nextStep = '维持现有仓位，等待下一个有效买入信号再评估加仓。';
    }

    return {
        action,
        headline,
        reason,
        next_step: nextStep,
        checks,
        stats: {
            invested,
            cap,
            tranche,
            room_left: roomLeft,
            est_value: Math.round(estValue * 100) / 100,
            n_live_months: nLive,
            n_deposits: deposits.length,
            live_total_return: Math.round(personalReturn * 10000) / 10000,
            strategy_return: Math.round(strategyReturn * 10000) / 10000,
            live_max_drawdown: Math.round(maxDd * 10000) / 10000,
            spy_total_return: spyTotalReturn == null ? null : Math.round(spyTotalReturn * 10000) / 10000,
            rel_spy: relSpy == null ? null : Math.round(relSpy * 10000) / 10000,
            live_start_month: start,
            benchmark: bmName,
        },
        thresholds: t,
    };
}

function renderPlanResult(container, plan) {
    const result = container.querySelector('#plan-result');
    if (!result || !plan) return;

    const { cls: badgeClass, text: badgeText } = planBadgeMeta(plan.action);
    updatePlanFab(plan);

    const s = plan.stats || {};
    const t = plan.thresholds || {};
    const bmName = s.benchmark || 'SPY';
    const relStr = planFmtSignedPct1(s.rel_spy);
    const relClass = s.rel_spy == null ? 'val-neutral' : (s.rel_spy >= 0 ? 'val-pos' : 'val-neg');
    const liveClass = (s.live_total_return || 0) >= 0 ? 'val-pos' : 'val-neg';
    const pctFull = s.cap > 0 ? Math.min(100, Math.max(0, (s.invested / s.cap) * 100)) : 0;

    const statCards = [
        { label: '已投 / 上限', value: `${planFmtUsd(s.invested)} / ${planFmtUsd(s.cap)}` },
        { label: `我的收益 (${s.n_deposits || 0}笔)`, value: planFmtSignedPct1(s.live_total_return), cls: liveClass },
        { label: `策略 vs ${bmName}`, value: relStr, cls: relClass },
        { label: '策略峰值回撤', value: planFmtSignedPct1(s.live_max_drawdown), cls: 'val-neg' },
    ].map(c =>
        `<div class="plan-stat">
            <div class="plan-stat-label">${c.label}</div>
            <div class="plan-stat-value ${c.cls || ''}">${c.value}</div>
        </div>`
    ).join('');

    const checks = (plan.checks || []).map(c =>
        `<div class="plan-check ${c.ok ? 'plan-check-ok' : 'plan-check-bad'}">
            <span class="plan-check-icon">${c.ok ? '✓' : '✕'}</span>
            <span><span class="plan-check-label">${c.label}</span>${c.detail ? ` — <span class="plan-check-detail">${c.detail}</span>` : ''}</span>
        </div>`
    ).join('');

    const estLine = s.invested > 0
        ? `<div class="plan-est">当前市值粗估 <strong>${planFmtUsd(s.est_value)}</strong>（按各笔入金月份起分别吃到的策略月收益累乘）</div>`
        : '';

    const foot = `规则：信号驱动加仓（每次一档 ${planFmtUsd(s.tranche)}，加到上限 ${planFmtUsd(s.cap)} 为止）；`
        + `策略失效止损（策略回撤破 ${((t.stop_drawdown || 0) * 100).toFixed(0)}%，`
        + `或满 ${t.stop_min_months || 0} 个月后策略累计低于 ${((t.stop_live_return || 0) * 100).toFixed(0)}% 且相对 ${bmName} 落后 ${((t.stop_rel_spy || 0) * 100).toFixed(0)}%）。`
        + `首笔入金 ${s.live_start_month || '—'}。数值保存在本机浏览器，换设备需重新填写。`;

    result.innerHTML = `
        <div class="plan-verdict">
            <span class="plan-badge ${badgeClass}">${badgeText}</span>
            <div class="plan-verdict-text">
                <div class="plan-headline">${plan.headline}</div>
                <div class="plan-reason">${plan.reason}</div>
            </div>
        </div>
        <div class="plan-body">
            <div class="plan-next"><strong>下一步：</strong>${plan.next_step}</div>
            ${estLine}
            <div class="plan-stats">${statCards}</div>
            <div class="plan-fund-bar"><div class="plan-fund-fill" style="width:${pctFull}%"></div></div>
            <div class="plan-checks-title">健康检查</div>
            ${checks}
            <div class="plan-foot">${foot}</div>
        </div>`;
}

function refreshPositionPlan(container) {
    const inputs = readPlanInputsFromForm(container);
    savePlanInputs(inputs);
    renderPlanResult(container, computePositionPlan(inputs));
}

function bindPlanFormEvents(container) {
    const onChange = () => refreshPositionPlan(container);
    container.querySelectorAll('#plan-cap, #plan-tranche').forEach(el => {
        el.addEventListener('input', onChange);
        el.addEventListener('change', onChange);
    });
    const list = container.querySelector('#plan-deposits');
    list?.addEventListener('input', onChange);
    list?.addEventListener('change', onChange);
    list?.addEventListener('click', (e) => {
        const btn = e.target.closest('.plan-dep-remove');
        if (!btn) return;
        const row = btn.closest('.plan-deposit-row');
        row?.remove();
        const inputs = readPlanInputsFromForm(container);
        if (!inputs.deposits.length) {
            const d = DATA.position_plan.defaults || {};
            list.innerHTML = depositRowsHtml([{
                month: d.start_month || new Date().toISOString().slice(0, 7),
                amount: 0,
            }]);
        }
        refreshPositionPlan(container);
    });
    container.querySelector('#plan-add-deposit')?.addEventListener('click', () => {
        const inputs = readPlanInputsFromForm(container);
        const last = inputs.deposits[inputs.deposits.length - 1];
        let nextMonth = (DATA.current_month || new Date().toISOString().slice(0, 7));
        if (last && last.month >= nextMonth) {
            const [y, m] = last.month.split('-').map(Number);
            const dt = new Date(y, m - 1 + 1, 1);
            nextMonth = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
        }
        const amount = inputs.tranche || (DATA.position_plan.defaults || {}).tranche || 0;
        inputs.deposits.push({ month: nextMonth, amount });
        container.querySelector('#plan-deposits').innerHTML = depositRowsHtml(inputs.deposits);
        savePlanInputs(inputs);
        renderPlanResult(container, computePositionPlan(inputs));
    });
    container.querySelector('#plan-reset')?.addEventListener('click', () => {
        try {
            localStorage.removeItem(PLAN_STORAGE_KEY);
            localStorage.removeItem('sp_live_plan_v1');
        } catch (_) {}
        renderPositionPlan();
    });
}

function renderHeroStats() {
    const el = document.getElementById('hero-stats');
    if (!el) return;
    const kpis = DATA.performance_kpis || [];
    const year = new Date().getFullYear();
    const picks = [
        kpis.find(k => k.label === `${year} YTD`),
        kpis.find(k => k.label === 'Total return'),
        kpis.find(k => k.label === 'CAGR'),
    ].filter(Boolean);
    if (!picks.length) {

// ===== Strategy vs benchmarks table =====
function sharpeColorClass(sharpe) {
    const n = Number(sharpe);
    if (Number.isNaN(n)) return 'val-neutral';
    return n >= 1 ? 'val-pos' : 'val-neg';
}

function returnColorClass(ret) {
    if (ret > 0) return 'val-pos';
    if (ret < 0) return 'val-neg';
    return 'val-neutral';
}

function retBadgeClass(ret) {
    if (ret > 0) return 'ret-badge-pos';
    if (ret < 0) return 'ret-badge-neg';
    return 'ret-badge-flat';
}

function renderComparison() {
    const tbody = document.getElementById('comparison-tbody');
    tbody.innerHTML = DATA.comparison_rows.map(r => {
        const rowCls = r.name === 'Strategy' ? ' class="is-strategy"' : '';
        return `<tr${rowCls}>
            <td class="font-medium"><span class="name-cell"><span class="legend-dot" style="background:${r.dot_color}" aria-hidden="true"></span>${r.name}</span></td>
            <td class="${returnColorClass(r.total_return)}">${fmtPct(r.total_return)}</td>
            <td class="${returnColorClass(r.cagr)}">${fmtPct(r.cagr)}</td>
            <td class="val-neg">${fmtPct(r.max_drawdown)}</td>
            <td class="${sharpeColorClass(r.sharpe)}">${Number(r.sharpe).toFixed(2)}</td>
            <td class="val-neutral">${fmtPct(r.win_rate, 0)}</td>
        </tr>`;
    }).join('');
}

function formatMonthLabel(ym) {
    if (!ym || typeof ym !== 'string') return 'This Month';
    const parts = ym.split('-');
    if (parts.length < 2) return ym;
    const months = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];
    const mi = parseInt(parts[1], 10) - 1;
    if (mi < 0 || mi > 11) return ym;
    return months[mi];
}

// ===== Current month: title, MTD badge, holdings =====
function renderCurrentMonth() {
    const title = document.getElementById('current-month-title');
    if (title) title.textContent = `${formatMonthLabel(DATA.current_month)} so far`;

    const badge = document.getElementById('current-month-badge');

            badge.className = 'mtd-badge';

// Soft green / red tuned to the warm cream page (MotherDuck-adjacent palette)
const HIST_POS = '#0f8a3d';
const HIST_NEG = '#d61f45';
const HIST_POS_FILL = 'rgba(15, 138, 61, 0.14)';
const HIST_NEG_FILL = 'rgba(214, 31, 69, 0.12)';
const MD_INK = '#26231e';
const MD_MUTED = '#8a8177';
const MD_GRID = 'rgba(38,35,30,0.08)';
const MD_AXIS = 'rgba(38,35,30,0.16)';
const MD_FONT = 'Inter, system-ui, sans-serif';
const MD_SURFACE = '#fffdf8';

function showChartError(container, msg) {
    container.innerHTML = `<div style="padding:12px;color:#b91c1c;font-size:12px;background:#fef2f2;border-radius:6px;">${msg}</div>`;
}

function waitForCharts(callback, container, failMsg) {
    if (typeof Chart !== 'undefined') {
        callback();
        return;
    }
    let attempts = 0;
    const iv = setInterval(() => {
        attempts++;
        if (typeof Chart !== 'undefined') {
            clearInterval(iv);
            callback();
        } else if (attempts > 40) {
            clearInterval(iv);
            if (container) {
                container.innerHTML = `<div style="padding:12px;color:#666;font-size:12px;">${failMsg}</div>`;
            }
        }
    }, 100);
}

function isNarrowViewport(container) {
    const w = (container && container.clientWidth) || (typeof window !== 'undefined' ? window.innerWidth : 800);
    return w < 560;
}

function seriesXY(points) {
    const x = [];
    const y = [];
    (points || []).forEach(p => {
        if (!p || p.value === undefined || p.value === null) return;
        x.push(p.time);
        y.push(p.value);
    });
    return { x, y };
}

function formatYmLabel(raw, narrow) {
    const s = String(raw || '');
    // "2020-01-01" / "2020-01"
    const m = s.match(/(\d{4})-(\d{2})/);
    if (!m) return s;
    return narrow ? `${m[1].slice(2)}-${m[2]}` : `${m[1]}-${m[2]}`;
}

function formatMdLabel(raw) {
    const s = String(raw || '');
    const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (!m) return formatYmLabel(s, false);
    return `${Number(m[2])}/${Number(m[3])}`;
}

function formatHoverDate(raw) {
    const s = String(raw || '');
    const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (m) return `${m[1]}-${m[2]}-${m[3]}`;
    const ym = s.match(/(\d{4})-(\d{2})/);
    if (ym) return `${ym[1]}-${ym[2]}`;
    return s;
}

function yTickFormatter(fmt) {
    if (!fmt) return (v) => String(v);
    if (fmt === 'd') return (v) => String(Math.round(v));
    if (fmt.includes('%')) {
        const digits = Number((fmt.match(/\.(\d+)/) || [])[1] || 0);
        return (v) => `${(Number(v) * 100).toFixed(digits)}%`;
    }
    if (fmt.includes(',')) {
        const digits = Number((fmt.match(/\.(\d+)/) || [])[1] || 0);
        return (v) => Number(v).toLocaleString('en-US', {
            minimumFractionDigits: digits,
            maximumFractionDigits: digits,
        });
    }
    return (v) => String(v);
}

function yTooltipFormatter(fmt) {
    if (!fmt) return (v) => Number(v).toFixed(2);
    if (fmt === 'd') return (v) => String(Math.round(v));
    if (fmt.includes('%')) {
        // Prefer one more digit in tooltip than axis for percent series
        const axisDigits = Number((fmt.match(/\.(\d+)/) || [])[1] || 0);
        const digits = Math.max(axisDigits, fmt === '.0%' ? 2 : axisDigits);
        return (v) => `${(Number(v) * 100).toFixed(digits)}%`;
    }
    if (fmt.includes(',')) {
        const digits = Number((fmt.match(/\.(\d+)/) || [])[1] || 1);
        return (v) => Number(v).toLocaleString('en-US', {
            minimumFractionDigits: digits,
            maximumFractionDigits: digits,
        });
    }
    return (v) => Number(v).toFixed(2);
}

/** Dashed vertical crosshair on hover. */
const mdCrosshairPlugin = {
    id: 'mdCrosshair',
    afterDraw(chart) {
        const active = chart.tooltip?.getActiveElements?.() || [];
        if (!active.length) return;
        const { ctx, chartArea } = chart;
        const x = active[0].element.x;
        ctx.save();
        ctx.beginPath();
        ctx.setLineDash([4, 3]);
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(56,56,56,0.35)';
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.stroke();
        ctx.restore();
    },
};

const chartInstances = new Set();
let chartResizeTimer = null;
let chartResizeBound = false;

function ensureChartResizeListener() {
    if (chartResizeBound) return;
    chartResizeBound = true;
    window.addEventListener('resize', () => {
        if (chartResizeTimer != null) clearTimeout(chartResizeTimer);
        chartResizeTimer = setTimeout(() => {
            chartResizeTimer = null;
            chartInstances.forEach(ch => {
                try { ch.resize(); } catch (e) {}
            });
        }, 100);
    });
}

function mountCanvas(container) {
    container.innerHTML = '';
    const canvas = document.createElement('canvas');
    container.appendChild(canvas);
    return canvas;
}

function baseChartOptions({
    narrow = false,
    showLegend = false,
    yFormat = null,
    xLabelFn = null,
    xMaxTicks = 8,
    xMaxRotation = 0,
    tooltipLabelFn = null,
    tooltipTitleFn = null,
    padding = {},
} = {}) {
    const yFmt = yTickFormatter(yFormat);
    const tipY = yTooltipFormatter(yFormat);
    return {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: {
            mode: 'index',
            intersect: false,
            axis: 'x',
        },
        layout: {
            padding: {
                top: padding.top != null ? padding.top : (showLegend ? 8 : 4),
                right: padding.right != null ? padding.right : 8,
                bottom: padding.bottom != null ? padding.bottom : 4,
                left: padding.left != null ? padding.left : 4,
            },
        },
        plugins: {
            legend: {
                display: showLegend,
                position: 'top',
                align: 'start',
                labels: {
                    boxWidth: 8,
                    boxHeight: 8,
                    padding: 12,
                    color: MD_MUTED,
                    font: { family: MD_FONT, size: 11 },
                    usePointStyle: true,
                    pointStyle: 'circle',
                },
            },
            tooltip: {
                enabled: true,
                backgroundColor: MD_SURFACE,
                titleColor: MD_INK,
                bodyColor: MD_INK,
                borderColor: MD_INK,
                borderWidth: 1.5,
                cornerRadius: 8,
                padding: { top: 8, bottom: 8, left: 10, right: 10 },
                displayColors: true,
                boxPadding: 4,
                titleFont: { family: MD_FONT, size: 12, weight: '600' },
                bodyFont: { family: MD_FONT, size: 12 },
                callbacks: {
                    title(items) {
                        if (tooltipTitleFn) return tooltipTitleFn(items);
                        if (!items.length) return '';
                        return formatHoverDate(items[0].label);
                    },
                    label(ctx) {
                        if (tooltipLabelFn) return tooltipLabelFn(ctx);
                        const name = ctx.dataset.label || '';
                        const v = tipY(ctx.parsed.y);
                        return name ? `${name}: ${v}` : v;
                    },
                },
            },
        },
        scales: {
            x: {
                grid: { display: false, drawBorder: false },
                border: { color: MD_AXIS, width: 1 },
                ticks: {
                    color: MD_MUTED,
                    font: { family: MD_FONT, size: narrow ? 10 : 11 },
                    maxRotation: xMaxRotation,
                    minRotation: xMaxRotation,
                    autoSkip: true,
                    maxTicksLimit: xMaxTicks,
                    callback(value) {
                        const label = this.getLabelForValue(value);
                        return xLabelFn ? xLabelFn(label) : label;
                    },
                },
            },
            y: {
                position: 'right',
                grid: {
                    color: MD_GRID,
                    drawBorder: false,
                    lineWidth: 1,
                },
                border: { display: false },
                ticks: {
                    color: MD_MUTED,
                    font: { family: MD_FONT, size: 11 },
                    callback(value) {
                        return yFmt(value);
                    },
                },
            },
        },
    };
}

function createChart(container, config) {
    const canvas = mountCanvas(container);
    const chart = new Chart(canvas, config);
    chartInstances.add(chart);
    ensureChartResizeListener();
    return chart;
}

function orderedSeriesNames(seriesMap) {
    return Object.keys(seriesMap || {}).sort((a, b) => {
        if (a === STRATEGY_KEY) return -1;
        if (b === STRATEGY_KEY) return 1;
        return a.localeCompare(b);
    });
}

function initMultiLineChart(containerId, seriesMap, options = {}) {
    const container = document.getElementById(containerId);
    if (!container || !seriesMap || Object.keys(seriesMap).length === 0) return;
    try {
        const narrow = isNarrowViewport(container);
        const names = orderedSeriesNames(seriesMap);
        let labels = null;
        const datasets = [];
        names.forEach(name => {
            const { x, y } = seriesXY(seriesMap[name]);
            if (!x.length) return;
            if (!labels) labels = x;
            const color = chartColors[name] || '#6b7280';
            const isStrategy = name === STRATEGY_KEY;
            const lw = options.lineWidth
                ? options.lineWidth(name)
                : (isStrategy ? 2.5 : 1.75);
            datasets.push({
                label: name,
                data: y,
                borderColor: color,
                backgroundColor: color,
                borderWidth: lw,
                pointRadius: 0,
                pointHoverRadius: 3,
                pointHoverBorderWidth: 1.5,
                pointHoverBorderColor: color,
                pointHoverBackgroundColor: MD_SURFACE,
                tension: 0.35,
                spanGaps: true,
                fill: false,
            });
        });
        if (!datasets.length || !labels) return;

        const yFormat = (options.yaxis && options.yaxis.tickformat) || null;
        const xMaxTicks = (options.xaxis && options.xaxis.nticks) || (narrow ? 4 : 8);
        const xMaxRotation = (options.xaxis && options.xaxis.tickangle)
            ? Math.abs(options.xaxis.tickangle)
            : (narrow ? 35 : 0);
        const tipY = yTooltipFormatter(yFormat);

        createChart(container, {
            type: 'line',
            data: { labels, datasets },
            options: baseChartOptions({
                narrow,
                showLegend: datasets.length > 1,
                yFormat,
                xLabelFn: (lab) => formatYmLabel(lab, narrow),
                xMaxTicks,
                xMaxRotation,
                tooltipLabelFn: (ctx) => {
                    const name = ctx.dataset.label || '';
                    return `${name}: ${tipY(ctx.parsed.y)}`;
                },
                padding: {
                    top: narrow ? 4 : 2,
                    bottom: narrow ? 2 : 0,
                },
            }),
            plugins: [mdCrosshairPlugin],
        });
    } catch (err) {
        console.error(containerId, err);
        showChartError(container, options.errorMsg || 'Chart failed to render');
    }
}

function initBarChart(containerId, data, options = {}) {
    const container = document.getElementById(containerId);
    if (!container || !data || data.length === 0) return;
    try {
        const narrow = isNarrowViewport(container);
        const labels = data.map(d => d.label || d.x);
        const values = data.map(d => d.y);
        const colors = data.map(d => d.color || options.color || HIST_POS);
        const yFormat = (options.yaxis && options.yaxis.tickformat) || null;
        const tipY = yTooltipFormatter(yFormat);
        const xCfg = options.xaxis || {};
        const isPctAxis = xCfg.ticksuffix === '%';
        const bargap = options.bargap != null ? options.bargap : 0.18;
        const categoryPercentage = Math.max(0.5, Math.min(1, 1 - bargap * 0.5));
        const barPercentage = Math.max(0.55, Math.min(1, 1 - bargap));

        let xLabelFn = (lab) => lab;
        if (isPctAxis) {
            xLabelFn = (lab) => `${Number(lab).toFixed(0)}%`;
        } else if (xCfg.tickformat) {
            xLabelFn = (lab) => formatYmLabel(lab, narrow);
        }

        const chartOptions = baseChartOptions({
            narrow,
            showLegend: false,
            yFormat,
            xLabelFn,
            xMaxTicks: xCfg.nticks || (narrow ? 4 : 10),
            xMaxRotation: xCfg.tickangle ? Math.abs(xCfg.tickangle) : (narrow ? 45 : 0),
            tooltipTitleFn: (items) => {
                if (!items.length) return '';
                const row = data[items[0].dataIndex];
                if (isPctAxis) return row?.label || `${row?.x}%`;
                return formatHoverDate(row?.label || row?.x || items[0].label);
            },
            tooltipLabelFn: (ctx) => {
                if (options.tooltipKind === 'count' || isPctAxis) {
                    return `Count: ${Math.round(ctx.parsed.y)}`;
                }
                return tipY(ctx.parsed.y);
            },
            padding: { top: 4, bottom: narrow ? 2 : 0 },
        });
        chartOptions.plugins.tooltip.displayColors = false;

        createChart(container, {
            type: 'bar',
            data: {
                labels: isPctAxis ? data.map(d => d.x) : labels,
                datasets: [{
                    data: values,
                    backgroundColor: colors,
                    borderWidth: 0,
                    borderRadius: 2,
                    categoryPercentage,
                    barPercentage,
                }],
            },
            options: chartOptions,
            plugins: [mdCrosshairPlugin],
        });
    } catch (err) {
        console.error(containerId, err);
        showChartError(container, options.errorMsg || 'Chart failed to render');
    }
}

function initCurrentMonthCurve() {
    const container = document.getElementById('tv-current-month-chart');
    if (!container) return;
    const curve = tvCurrentMonthCurve || [];
    if (curve.length === 0) {
        container.innerHTML = `<div style="padding:12px;color:var(--text-muted);font-size:12px;">No holdings data for this month</div>`;
        return;
    }
    const last = curve[curve.length - 1]?.value ?? 0;
    const lineColor = last >= 0 ? HIST_POS : HIST_NEG;
    const fillColor = last >= 0 ? HIST_POS_FILL : HIST_NEG_FILL;
    waitForCharts(() => {
        try {
            const { x, y } = seriesXY(curve);
            const narrow = isNarrowViewport(container);
            const chartOptions = baseChartOptions({
                narrow,
                showLegend: false,
                yFormat: '.1%',
                xLabelFn: formatMdLabel,
                xMaxTicks: narrow ? 3 : Math.min(x.length, 8),
                xMaxRotation: narrow ? 40 : 0,
                tooltipLabelFn: (ctx) => yTooltipFormatter('.2%')(ctx.parsed.y),
                padding: { top: 2, bottom: narrow ? 2 : 0 },
            });
            chartOptions.plugins.tooltip.displayColors = false;

            createChart(container, {
                type: 'line',
                data: {
                    labels: x,
                    datasets: [{
                        label: 'MTD',
                        data: y,
                        borderColor: lineColor,
                        backgroundColor: fillColor,
                        borderWidth: 2.5,
                        fill: true,
                        pointRadius: 0,
                        pointHoverRadius: 3,
                        pointHoverBackgroundColor: MD_SURFACE,
                        tension: 0.35,
                    }],
                },
                options: chartOptions,
                plugins: [mdCrosshairPlugin],
            });
        } catch (err) {
            console.error('tv-current-month-chart', err);
            showChartError(container, 'Failed to render this month\'s return curve. Please refresh.');
        }
    }, container, 'Chart library failed to load. Check your network and refresh.');
}

function initEquityChart() {
    const container = document.getElementById('tv-equity-chart');
    const narrow = isNarrowViewport(container);
    waitForCharts(() => initMultiLineChart('tv-equity-chart', tvEquityData, {
        lineWidth: (name) => name === STRATEGY_KEY ? 2.75 : 1.75,
        yaxis: { tickformat: ',.1f' },
        xaxis: {
            nticks: narrow ? 4 : 8,
            tickangle: narrow ? -35 : 0,
        },
        errorMsg: 'Failed to render equity curve. Please refresh.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}

function initDrawdownChart() {
    const container = document.getElementById('tv-drawdown-chart');
    const narrow = isNarrowViewport(container);
    waitForCharts(() => initMultiLineChart('tv-drawdown-chart', tvDrawdownSeries, {
        yaxis: { tickformat: '.0%' },
        xaxis: {
            nticks: narrow ? 4 : 8,
            tickangle: narrow ? -35 : 0,
        },
        errorMsg: 'Failed to render drawdown chart. Please refresh.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}

function initMonthlyReturnsChart() {
    const container = document.getElementById('tv-monthly-chart');
    const monthly = (DATA.monthly_data || []).filter(
        m => !String(m.sell_date || '').includes('(open)')
    );
    const narrow = isNarrowViewport(container);
    const data = monthly.map(m => ({
        x: String(m.month || '').length === 7 ? `${m.month}-01` : m.month,
        y: m.monthly_return,
        label: m.month,
        color: m.monthly_return >= 0 ? HIST_POS : HIST_NEG,
    }));
    waitForCharts(() => initBarChart('tv-monthly-chart', data, {
        bargap: 0.18,
        yaxis: { tickformat: '.0%' },
        xaxis: {
            tickformat: narrow ? '%y-%m' : '%Y-%m',
            nticks: narrow ? 4 : 10,
            tickangle: narrow ? -45 : 0,
        },
        errorMsg: 'Failed to render monthly returns. Please refresh.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}

function initReturnDistChart() {
    const container = document.getElementById('tv-return-dist-chart');
    const raw = tvReturnDistData || [];
    if (!raw.length) return;
    const data = raw.map(d => ({
        x: d.pct,
        y: d.value,
        label: `${Number(d.pct).toFixed(1)}%`,
        color: d.pct >= 0 ? HIST_POS : HIST_NEG,
    }));
    waitForCharts(() => initBarChart('tv-return-dist-chart', data, {
        bargap: 0.06,
        tooltipKind: 'count',
        yaxis: { tickformat: 'd' },
        xaxis: {
            ticksuffix: '%',
            nticks: 8,
        },
        errorMsg: 'Failed to render return distribution.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}

function initializeAll() {
    renderPositionPlan();
    renderHeroStats();
    renderHeader();
    renderKPIs();
    renderComparison();
    renderCurrentMonth();
    renderMonthlyCards();
    // First paint: only the above-the-fold MTD chart. Below-fold charts lazy-init.
    initCurrentMonthCurve();
    whenChartVisible('tv-equity-chart', initEquityChart);
    whenChartVisible('tv-drawdown-chart', initDrawdownChart);
    whenChartVisible('tv-monthly-chart', initMonthlyReturnsChart);
    whenChartVisible('tv-return-dist-chart', initReturnDistChart);
}

/** Run init once when the chart container nears the viewport. */
function whenChartVisible(containerId, initFn) {
    const el = document.getElementById(containerId);
    if (!el) return;
    if (typeof IntersectionObserver === 'undefined') {
        initFn();
        return;
    }
    let done = false;
    const obs = new IntersectionObserver((entries) => {
        if (done) return;
        if (!entries.some(e => e.isIntersecting)) return;
        done = true;
        obs.disconnect();
        initFn();
    }, { rootMargin: '120px 0px', threshold: 0.01 });
    obs.observe(el);
}

initializeAll();


    </script>
