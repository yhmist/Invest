    <style>
        :root {
            --bg: #f4efea;
            --bg-deep: #ebe4db;
            --surface: #f8f8f7;
            --surface-muted: #efe9e2;
            --ink: #383838;
            --text: #383838;
            --text-muted: #6b6560;
            --text-subtle: #8a837c;
            --border: #383838;
            --border-soft: rgba(56, 56, 56, 0.18);
            --accent: #97d4ff;
            --accent-deep: #6fc2ff;
            --yellow: #ffde00;
            --orange: #ff9538;
            --pos: #16a34a;
            --neg: #e11d48;
            --radius: 2px;
            /* Inter via Google Fonts */
            --font-display: 'Inter', system-ui, sans-serif;
            --font-mono: 'Inter', system-ui, sans-serif;
            --font-fono: 'Inter', system-ui, sans-serif;
            --font-weight-body: 400;
            --font-weight-strong: 600;
            --letter-spacing-body: 0.01em;
            --letter-spacing-wide: 0.06em;
            --plan-action-w: 2.25rem;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: var(--font-mono);
            font-weight: var(--font-weight-body);
            font-optical-sizing: auto;
            letter-spacing: var(--letter-spacing-body);
            background:
                radial-gradient(circle at 12% 8%, rgba(151, 212, 255, 0.28), transparent 28%),
                radial-gradient(circle at 88% 0%, rgba(255, 222, 0, 0.22), transparent 24%),
                radial-gradient(circle at 80% 70%, rgba(255, 149, 56, 0.12), transparent 30%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .page { max-width: 1120px; margin: 0 auto; padding: 2rem 1.5rem 4.5rem; }
        .font-display {
            font-family: var(--font-display);
            font-weight: var(--font-weight-strong);
            letter-spacing: var(--letter-spacing-wide);
            text-transform: uppercase;
        }
        .font-mono { font-family: var(--font-mono); font-weight: var(--font-weight-body); }
        .font-medium { font-weight: 500; }
        .font-semibold, strong, b { font-weight: 600; }
        .signals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        @media (min-width: 640px) { .signals-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .signals-grid { grid-template-columns: repeat(5, 1fr); } }
        .month-cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        @media (min-width: 640px) { .month-cards-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .month-cards-grid { grid-template-columns: repeat(3, 1fr); } }
        .top-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--yellow);
            border-bottom: 1.5px solid var(--ink);
            color: var(--ink);
            font-family: var(--font-fono);
            font-size: 0.75rem;
            font-weight: var(--font-weight-strong);
            letter-spacing: var(--letter-spacing-wide);
            text-transform: uppercase;
            text-align: center;
            padding: 0.55rem 1rem;
            line-height: 1.2;
        }
        .site-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1.1rem 0 1.6rem;
            border-bottom: 1.5px solid var(--ink);
            margin-bottom: 2rem;
        }
        /* ===== Position Plan (on-demand drawer) ===== */
        .plan-fab {
            position: fixed;
            right: 1.25rem;
            bottom: 1.25rem;
            z-index: 40;
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.7rem 1rem;
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            font-family: var(--font-mono);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(56, 56, 56, 0.12);
        }
        .plan-fab:hover { background: var(--yellow); }
        .plan-fab-badge {
            display: none;
            align-items: center;
            justify-content: center;
            min-width: 2.6rem;
            padding: 0.2rem 0.45rem;
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            line-height: 1;
        }
        .plan-fab-badge.is-on { display: inline-flex; }
        .plan-fab-badge.plan-badge-add { background: var(--pos); color: #fff; }
        .plan-fab-badge.plan-badge-hold { background: var(--accent); color: var(--ink); }
        .plan-fab-badge.plan-badge-wait { background: var(--yellow); color: var(--ink); }
        .plan-fab-badge.plan-badge-stop { background: var(--neg); color: #fff; }
        .plan-drawer-root {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
        }
        .plan-drawer-root.is-open,
        .plan-drawer-root.is-open[hidden] {
            display: block;
            /* override UA [hidden] { display:none !important } when opening */
        }
        .plan-drawer-root.is-open { display: block !important; }
        .plan-drawer-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(56, 56, 56, 0.28);
        }
        .plan-drawer {
            position: absolute;
            top: 0;
            right: 0;
            width: min(440px, 100%);
            height: 100%;
            background: var(--surface);
            border-left: 1.5px solid var(--ink);
            display: flex;
            flex-direction: column;
            box-shadow: -12px 0 40px rgba(56, 56, 56, 0.12);
        }
        .plan-drawer-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.15rem;
            border-bottom: 1.5px solid var(--ink);
            flex-shrink: 0;
        }
        .plan-drawer-title {
            margin: 0;
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: var(--letter-spacing-wide);
            text-transform: uppercase;
        }
        .plan-drawer-close {
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.35rem 0.65rem;
            cursor: pointer;
        }
        .plan-drawer-close:hover { background: var(--surface-muted); }
        .plan-drawer-body {
            overflow: auto;
            flex: 1;
            padding: 0;
        }
        .plan-panel { background: var(--surface); }
        .plan-form {
            padding: 1rem 1.15rem 1.15rem;
            border-top: 1.5px solid var(--ink);
        }
        .plan-form-head {
            margin-bottom: 0.75rem;
        }
        .plan-form-title {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--ink);
        }
        .plan-form-hint {
            margin-top: 0.2rem;
            font-size: 0.7rem;
            color: var(--text-subtle);
            line-height: 1.4;
        }
        /* Shared 2-field + action-slot grid so settings align with deposit rows */
        .plan-cols {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) var(--plan-action-w);
            gap: 0.55rem;
            align-items: end;
        }
        .plan-cols-action {
            width: var(--plan-action-w);
            height: 2.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .plan-cols-action.is-spacer {
            visibility: hidden;
            pointer-events: none;
            border: none;
            padding: 0;
        }
        .plan-deposits-head {
            margin: 1rem 0 0.5rem;
        }
        .plan-deposits-title {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--ink);
        }
        .plan-deposits-hint {
            margin-top: 0.2rem;
            font-size: 0.7rem;
            color: var(--text-subtle);
            line-height: 1.4;
        }
        .plan-deposits {
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }
        .plan-deposits-empty {
            font-size: 0.82rem;
            color: var(--text-muted);
            padding: 0.35rem 0;
        }
        .plan-dep-remove {
            width: var(--plan-action-w);
            height: 2.25rem;
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            padding: 0;
        }
        .plan-dep-remove:hover { background: var(--neg); color: #fff; }
        .plan-est {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0 0 0.85rem;
            line-height: 1.45;
        }
        .plan-est strong { color: var(--ink); font-weight: 600; }
        .plan-field {
            display: flex;
            flex-direction: column;
            gap: 0.28rem;
            min-width: 0;
        }
        .plan-field-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--text-subtle);
            line-height: 1.2;
        }
        .plan-field input {
            width: 100%;
            height: 2.25rem;
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            padding: 0 0.6rem;
            line-height: 1.2;
        }
        .plan-field input:focus {
            outline: 2px solid var(--accent-deep);
            outline-offset: 1px;
        }
        .plan-form-actions {
            margin-top: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .plan-add-btn,
        .plan-reset-btn {
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--ink);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.4rem 0.7rem;
            cursor: pointer;
        }
        .plan-add-btn:hover { background: var(--accent); }
        .plan-reset-btn:hover { background: var(--yellow); }
        .plan-verdict {
            display: flex;
            align-items: flex-start;
            gap: 0.85rem;
            padding: 1.05rem 1.15rem;
            border-bottom: 1.5px solid var(--ink);
            background: var(--surface);
        }
        .plan-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            min-width: 3.6rem;
            padding: 0.45rem 0.55rem;
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: var(--letter-spacing-wide);
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
        }
        .plan-badge-add { background: var(--pos); color: #fff; }
        .plan-badge-hold { background: var(--accent); color: var(--ink); }
        .plan-badge-wait { background: var(--yellow); color: var(--ink); }
        .plan-badge-stop { background: var(--neg); color: #fff; }
        .plan-verdict-text { min-width: 0; }
        .plan-headline {
            font-family: var(--font-mono);
            font-size: 1.02rem;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.3;
        }
        .plan-reason {
            margin-top: 0.3rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.45;
        }
        .plan-body { padding: 1rem 1.15rem 1.2rem; }
        .plan-next {
            font-size: 0.85rem;
            color: var(--ink);
            line-height: 1.5;
            margin-bottom: 0.85rem;
        }
        .plan-next strong { font-weight: 600; }
        .plan-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.55rem;
            margin-bottom: 0.9rem;
        }
        .plan-stat {
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 0.55rem 0.6rem;
            background: var(--surface-muted);
        }
        .plan-stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--text-subtle);
            line-height: 1.2;
        }
        .plan-stat-value {
            margin-top: 0.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: var(--ink);
            line-height: 1.15;
        }
        .plan-fund-bar {
            height: 0.4rem;
            border: 1px solid var(--ink);
            border-radius: 999px;
            background: var(--surface-muted);
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .plan-fund-fill { height: 100%; background: var(--pos); }
        .plan-checks-title {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-subtle);
            margin-bottom: 0.45rem;
        }
        .plan-check {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.35rem 0;
            border-bottom: 1px solid var(--border-soft);
            font-size: 0.78rem;
            line-height: 1.4;
        }
        .plan-check:last-child { border-bottom: none; }
        .plan-check-icon {
            flex-shrink: 0;
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            border: 1.5px solid var(--ink);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            line-height: 1;
            margin-top: 0.1rem;
        }
        .plan-check-ok .plan-check-icon { background: var(--pos); color: #fff; }
        .plan-check-bad .plan-check-icon { background: var(--neg); color: #fff; }
        .plan-check-label { font-weight: 500; color: var(--ink); }
        .plan-check-detail { color: var(--text-muted); }
        .plan-foot {
            margin-top: 0.85rem;
            font-size: 0.68rem;
            color: var(--text-subtle);
            line-height: 1.5;
        }
        body.plan-drawer-open { overflow: hidden; }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .brand-mark {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            background: var(--orange);
            border: 1.5px solid var(--ink);
            flex-shrink: 0;
        }
        .brand-name {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: var(--font-weight-strong);
            letter-spacing: var(--letter-spacing-wide);
            color: var(--ink);
            line-height: 1;
        }
        .date-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            color: var(--ink);
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            padding: 0.4rem 0.75rem;
            white-space: nowrap;
            line-height: 1;
        }
        .panel {
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
        }
        .panel-padded { padding: 1.35rem 1.4rem; }
        .section-block { margin-bottom: 2rem; }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.9rem;
            gap: 1rem;
        }
        .section-title {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: var(--font-weight-strong);
            color: var(--ink);
            letter-spacing: var(--letter-spacing-body);
            text-transform: none;
            line-height: 1.2;
        }
        .section-title::before {
            content: '';
            display: block;
            width: 0.55rem;
            height: 0.55rem;
            background: var(--accent);
            border: 1.5px solid var(--ink);
            flex-shrink: 0;
        }
        .section-subtitle {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--ink);
            text-transform: none;
            letter-spacing: 0.02em;
            margin-bottom: 0.85rem;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.85rem;
        }
        @media (min-width: 768px) { .metric-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .metric-grid.performance-grid { grid-template-columns: repeat(4, 1fr); } }
        .metric-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            padding: 1rem 1.05rem;
            min-height: 5.25rem;
        }
        .metric-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            line-height: 1.25;
        }
        .metric-value {
            margin-top: 0.55rem;
            font-family: var(--font-mono);
            font-size: 1.55rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.01em;
            line-height: 1.15;
            color: var(--ink);
        }
        #signals-container .metric-card {
            min-height: 4rem;
            align-items: center;
            justify-content: center;
        }
        #signals-container .metric-value {
            margin-top: 0;
        }
        .val-pos { color: var(--pos); }
        .val-neg { color: var(--neg); }
        .val-neutral { color: var(--text-muted); }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }
        .data-table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }
        .data-table th {
            text-align: left;
            padding: 0.7rem 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            border-bottom: 1.5px solid var(--ink);
            background: var(--surface-muted);
            white-space: nowrap;
            vertical-align: middle;
            line-height: 1.2;
        }
        .data-table th:not(:first-child) { text-align: right; }
        .data-table td {
            padding: 0.8rem 0.75rem;
            border-bottom: 1px solid var(--border-soft);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            vertical-align: middle;
            line-height: 1.2;
        }
        .data-table td:not(:first-child) { text-align: right; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tbody tr:hover { background: rgba(151, 212, 255, 0.18); }
        .data-table th:first-child,
        .data-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 1;
            width: 1%;
            max-width: 7.5rem;
            background: var(--surface);
            box-shadow: 1px 0 0 var(--border-soft);
        }
        .data-table thead th:first-child { background: var(--surface-muted); z-index: 2; }
        .data-table tbody tr:hover td:first-child { background: #e8f5ff; }
        /* Compact holdings book: no sticky overlay, ticker fits content */
        .holdings-table { min-width: 0; table-layout: auto; }
        .holdings-table th:first-child,
        .holdings-table td:first-child {
            position: static;
            left: auto;
            z-index: auto;
            width: 1%;
            max-width: none;
            box-shadow: none;
            padding-right: 0.5rem;
        }
        .holdings-table thead th:first-child { z-index: auto; }
        /* Even metric columns for Strategy vs Benchmarks */
        .comparison-table {
            table-layout: fixed;
            min-width: 640px;
        }
        .comparison-table th:first-child,
        .comparison-table td:first-child {
            width: 18%;
            max-width: none;
        }
        .comparison-table th:not(:first-child),
        .comparison-table td:not(:first-child) {
            width: 16.4%;
        }
        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1px solid var(--ink);
            margin-right: 0.5rem;
            vertical-align: middle;
            flex-shrink: 0;
        }
        .data-table .name-cell {
            display: inline-flex;
            align-items: center;

    <script>
    // Frontend logic: render dynamic content from #report-data and init charts.
const DATA = JSON.parse(document.getElementById('report-data').textContent);

const annualReturns = DATA.annual_returns;
const chartColors = DATA.colors_map;
const defaultYear = DATA.default_year;
const STRATEGY_KEY = 'Strategy';

/** Expand compact {times, series:{name:[y...]}} into Plotly-ready maps. */
function expandSharedSeries(raw) {
    if (!raw || !raw.times || !raw.series) return {};
    const out = {};
    Object.keys(raw.series).forEach(name => {
        const ys = raw.series[name] || [];
        out[name] = raw.times.map((t, i) => ({ time: t, value: ys[i] }));
    });
    return out;
}

const tvEquityData = expandSharedSeries(DATA.tv_equity_series);
const tvDrawdownSeries = expandSharedSeries(DATA.tv_drawdown_series);
const tvReturnDistData = DATA.tv_return_dist_data;
const tvCurrentMonthCurve = DATA.tv_current_month_curve;

/** Unpack holding row: [ticker, buy, sell, ret, score]. */
function holdingFields(d) {
    return {
        ticker: d[0],
        buy_price: Number(d[1]) || 0,
        sell_price: Number(d[2]) || 0,
        monthly_return: Number(d[3]) || 0,
        total_score: Number(d[4]) || 0,
    };
}

function monthYear(m) {
    return m.year || (m.month ? String(m.month).slice(0, 4) : '');
}

// ===== Number formatting (matches former Python _fmt_pct) =====
function fmtPct(v, digits = 1) {
    return (v * 100).toFixed(digits) + '%';
}

function fmtSignedPct(v, digits = 2) {
    const pct = v * 100;
    return (pct >= 0 ? '+' : '') + pct.toFixed(digits) + '%';
}

function formatKpiValue(k) {
    const v = k.value;
    if (k.format === 'number') return Number(v).toFixed(2);
    if (k.format === 'pct0') return fmtPct(v, 0);
    return fmtPct(v, 1);
}

function kpiColorClass(k) {
    const label = k.label || '';
    const v = Number(k.value);
    if (label.startsWith('Max drawdown') || label.startsWith('Worst month') || v < 0) {
        return 'val-neg';
    }
    if (label === 'Volatility') return 'val-neutral';
    if (label === 'Sharpe' || label === 'Sortino') {
        return v >= 1 ? 'val-pos' : 'val-neg';
    }
    return 'val-pos';
}

// ===== Position Plan (interactive top verdict panel) =====
const PLAN_STORAGE_KEY = 'sp_live_plan_v2';

function planFmtUsd(v) {
    return '$' + Number(v || 0).toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function planFmtSignedPct1(v) {
    if (v == null || Number.isNaN(v)) return '—';
    return (v * 100 >= 0 ? '+' : '') + (v * 100).toFixed(1) + '%';
}

function planBadgeMeta(action) {
    const cls = {
        ADD: 'plan-badge-add',
        HOLD: 'plan-badge-hold',
        WAIT: 'plan-badge-wait',
        STOP: 'plan-badge-stop',
    }[action] || 'plan-badge-hold';
    const text = {
        ADD: '加仓', HOLD: '保持', WAIT: '观望', STOP: '止损',
    }[action] || action;
    return { cls, text };
}

function updatePlanFab(plan) {
    const badge = document.getElementById('plan-fab-badge');
    if (!badge) return;
    if (!plan || !plan.action) {
        badge.className = 'plan-fab-badge';
        badge.textContent = '';
        return;
    }
    const meta = planBadgeMeta(plan.action);
    badge.className = `plan-fab-badge is-on ${meta.cls}`;
    badge.textContent = meta.text;
}

function setPlanDrawerOpen(open) {
    const root = document.getElementById('plan-drawer-root');
    const fab = document.getElementById('plan-fab');
    if (!root || !fab) return;
    root.classList.toggle('is-open', open);
    if (open) root.removeAttribute('hidden');
    else root.setAttribute('hidden', '');
    fab.setAttribute('aria-expanded', open ? 'true' : 'false');
    document.body.classList.toggle('plan-drawer-open', open);
}

function bindPlanDrawer() {
    const fab = document.getElementById('plan-fab');
    const closeBtn = document.getElementById('plan-drawer-close');
    const backdrop = document.getElementById('plan-drawer-backdrop');
    if (!fab || fab.dataset.bound === '1') return;
    fab.dataset.bound = '1';
    fab.addEventListener('click', () => setPlanDrawerOpen(true));
    closeBtn?.addEventListener('click', () => setPlanDrawerOpen(false));
    backdrop?.addEventListener('click', () => setPlanDrawerOpen(false));
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') setPlanDrawerOpen(false);
    });
}

function defaultPlanDeposits(defaults) {
    const d = defaults || {};
    if (Array.isArray(d.deposits) && d.deposits.length) {
        return d.deposits.map(x => ({
            month: String(x.month || '').slice(0, 7),
            amount: Math.max(0, Number(x.amount) || 0),
        }));
    }
    return [{
        month: String(d.start_month || '').slice(0, 7),
        amount: Math.max(0, Number(d.invested) || 0),
    }];
}

function normalizePlanInputs(raw, defaults) {
    const d = defaults || {};
    let deposits;
    if (Array.isArray(raw.deposits) && raw.deposits.length) {
        deposits = raw.deposits.map(x => ({
            month: String(x.month || '').slice(0, 7),
            amount: Math.max(0, Number(x.amount) || 0),
        })).filter(x => /^\d{4}-\d{2}$/.test(x.month));
    } else if (raw.invested != null || raw.start_month) {
        // migrate v1: single invested + start_month
        deposits = [{
            month: String(raw.start_month || d.start_month || '').slice(0, 7),
            amount: Math.max(0, Number(raw.invested) || 0),
        }].filter(x => /^\d{4}-\d{2}$/.test(x.month));
    }
    if (!deposits || !deposits.length) deposits = defaultPlanDeposits(d);
    deposits.sort((a, b) => a.month.localeCompare(b.month));
    return {
        cap: Math.max(0, Number(raw.cap ?? d.cap) || 0),
        tranche: Math.max(0, Number(raw.tranche ?? d.tranche) || 0),
        deposits,
    };
}

function readPlanInputsFromForm(container) {

function computeMoneyWeighted(deposits, monthlyData) {
    const start = deposits.length ? deposits.map(d => d.month).sort()[0] : '';
    const byMonth = {};
    for (const d of deposits) {
        byMonth[d.month] = (byMonth[d.month] || 0) + d.amount;
    }
    const months = (monthlyData || [])
        .map(m => m.month)
        .filter(m => m >= start);
    for (const m of Object.keys(byMonth)) {
        if (m >= start && !months.includes(m)) months.push(m);
    }
    months.sort();

    const retMap = {};
    for (const m of (monthlyData || [])) retMap[m.month] = Number(m.monthly_return) || 0;

    let portfolio = 0;
    let invested = 0;
    for (const month of months) {
        const add = byMonth[month] || 0;
        if (add) {
            portfolio += add;
            invested += add;
        }
        if (portfolio <= 0) continue;
        if (Object.prototype.hasOwnProperty.call(retMap, month)) {
            portfolio *= (1 + retMap[month]);
        }
    }
    const personalReturn = invested > 0 ? portfolio / invested - 1 : 0;
    return { invested, estValue: portfolio, personalReturn, start };
}

function computePositionPlan(inputs) {
    const meta = DATA.position_plan || {};
    const t = meta.thresholds || {};
    const ctx = meta.context || {};
    const bmMap = meta.bm_returns || {};
    const bmName = ctx.benchmark || 'SPY';
    const deposits = (inputs.deposits || []).filter(d => d.amount > 0 && /^\d{4}-\d{2}$/.test(d.month));
    const mw = computeMoneyWeighted(deposits, DATA.monthly_data || []);
    const start = mw.start || '';

    // 策略健康：从首笔入金月起的时间加权收益（与入金节奏无关）
    const liveRows = (DATA.monthly_data || []).filter(m => m.month >= start);
    const liveRets = liveRows.map(m => Number(m.monthly_return) || 0);
    const nLive = liveRows.length;

    let liveEquity = 1;
    for (const r of liveRets) liveEquity *= (1 + r);
    const strategyReturn = liveEquity - 1;

    let eq = 1;
    let peak = 1;
    let maxDd = 0;
    for (const r of liveRets) {
        eq *= (1 + r);
        peak = Math.max(peak, eq);
        maxDd = Math.min(maxDd, eq / peak - 1);
    }

    const spyRets = [];
    for (const m of liveRows) {
        if (Object.prototype.hasOwnProperty.call(bmMap, m.month) && bmMap[m.month] != null) {
            spyRets.push(Number(bmMap[m.month]));
        }
    }
    let spyTotalReturn = null;
    if (spyRets.length > 0) {
        spyTotalReturn = spyRets.reduce((acc, r) => acc * (1 + r), 1) - 1;
    }
    const relSpy = spyTotalReturn == null ? null : strategyReturn - spyTotalReturn;

    const invested = mw.invested;
    const cap = inputs.cap;
    const tranche = inputs.tranche;
    const roomLeft = Math.max(0, cap - invested);
    const isFull = tranche > 0 ? roomLeft < tranche * 0.5 : roomLeft <= 0;
    const estValue = mw.estValue;
    const personalReturn = mw.personalReturn;
    const strategyOn = !!ctx.strategy_on;
    const inBear = !!ctx.in_bear_market;

    const warnDd = t.warn_drawdown ?? -0.25;
    const stopDd = t.stop_drawdown ?? -0.40;
    const stopMinMonths = t.stop_min_months ?? 6;
    const stopLiveRet = t.stop_live_return ?? -0.20;
    const stopRelSpy = t.stop_rel_spy ?? -0.15;

    const checks = [];
    checks.push({
        label: '策略在场（非熊市保护、有可买标的）',
        ok: strategyOn,
        detail: strategyOn
            ? 'QQQ 50/200MA 未触发熊市，下期有可买标的'
            : '熊市保护触发或无可选股时应持现金、不加仓',
    });
    const ddOk = maxDd > warnDd;
    checks.push({
        label: `策略回撤未破警戒线（${(warnDd * 100).toFixed(0)}%）`,
        ok: ddOk,
        detail: `自 ${start || '—'} 起策略峰值回撤 ${(maxDd * 100).toFixed(1)}%`,
    });
    if (relSpy != null) {
        const relOk = !(nLive >= stopMinMonths && strategyReturn < stopLiveRet && relSpy < stopRelSpy);
        checks.push({
            label: `未出现「长期跑输且亏损」（≥${stopMinMonths}月起判定）`,
            ok: relOk,
            detail: `策略 ${planFmtSignedPct1(strategyReturn)} vs ${bmName} ${planFmtSignedPct1(spyTotalReturn)}`
                + `（相对 ${planFmtSignedPct1(relSpy)}），已跟踪 ${nLive} 个月`,
        });
    }

    const stopByDd = maxDd <= stopDd;
    const stopByUnderperf = (
        relSpy != null
        && nLive >= stopMinMonths
        && strategyReturn < stopLiveRet
        && relSpy < stopRelSpy
    );

    let action, headline, reason, nextStep;
    if (!deposits.length) {
        action = 'HOLD';
        headline = '先填写入金记录';
        reason = '还没有有效入金。按实际投入月份各记一笔，例如六月 $2000、七月 $2000。';
        nextStep = '在上方「入金记录」里添加每笔投入的月份和金额。';
    } else if (stopByDd || stopByUnderperf) {
        action = 'STOP';
        headline = '止损：策略疑似失效';
        if (stopByDd) {
            reason = `策略回撤 ${(maxDd * 100).toFixed(1)}% 已跌破止损线 ${(stopDd * 100).toFixed(0)}%，进入历史未见的恶劣区间。`;
        } else {
            reason = `已跟踪 ${nLive} 个月，策略累计 ${planFmtSignedPct1(strategyReturn)} 且相对 ${bmName} 落后 `
                + `${planFmtSignedPct1(relSpy)}，动量优势未兑现。`;
        }
        nextStep = '分批赎回、回到现金，暂停该策略；复盘信号与执行是否与回测一致后再决定是否重启。';
    } else if (inBear) {
        action = 'WAIT';
        headline = '观望：熊市保护中';
        reason = 'QQQ 50MA 已跌破 200MA，策略本月持现金。此时不加仓，也不因空仓恐慌离场。';
        nextStep = '保持现金仓位，等待熊市保护解除（50MA 重新上穿 200MA）再恢复加仓节奏。';
    } else if (!ddOk) {
        action = 'WAIT';
        headline = '观望：回撤接近历史极值';
        reason = `策略回撤 ${(maxDd * 100).toFixed(1)}% 已破警戒线 ${(warnDd * 100).toFixed(0)}%（接近回测极值 -33.5%），暂停加仓。`;
        nextStep = '维持现有仓位不动。回撤收窄回到警戒线以内再考虑加仓；继续恶化到止损线才离场。';
    } else if (isFull) {
        action = 'HOLD';
        headline = '保持：已到资金上限';
        reason = `已投入 ${planFmtUsd(invested)}，达到计划上限 ${planFmtUsd(cap)}，无空闲额度可加。`;
        nextStep = '按策略信号每月正常换仓，维持仓位，不再追加本金。';
    } else if (strategyOn) {
        action = 'ADD';
        headline = '可以加仓';
        reason = `策略在场、健康检查全部通过，且仍有额度（已投 ${planFmtUsd(invested)} / 上限 ${planFmtUsd(cap)}）。`;
        nextStep = `在下一个开盘日按信号买入时，追加一档 ${planFmtUsd(tranche)}（加满后剩余额度 ${planFmtUsd(Math.max(0, roomLeft - tranche))}）。加仓后请在入金记录里补上新的一笔。`;
    } else {
        action = 'HOLD';
        headline = '保持：持仓不动';
        reason = '策略当前无新的可买标的（多为持现金过渡），但也未触发任何风险线。';
        nextStep = '维持现有仓位，等待下一个有效买入信号再评估加仓。';
    }

    return {
        action,
        headline,
        reason,
        next_step: nextStep,
        checks,
        stats: {
            invested,
            cap,
            tranche,
            room_left: roomLeft,
            est_value: Math.round(estValue * 100) / 100,
            n_live_months: nLive,
            n_deposits: deposits.length,
            live_total_return: Math.round(personalReturn * 10000) / 10000,
            strategy_return: Math.round(strategyReturn * 10000) / 10000,
            live_max_drawdown: Math.round(maxDd * 10000) / 10000,
            spy_total_return: spyTotalReturn == null ? null : Math.round(spyTotalReturn * 10000) / 10000,
            rel_spy: relSpy == null ? null : Math.round(relSpy * 10000) / 10000,
            live_start_month: start,
            benchmark: bmName,
        },
        thresholds: t,
    };
}

function renderPlanResult(container, plan) {
    const result = container.querySelector('#plan-result');
    if (!result || !plan) return;

    const { cls: badgeClass, text: badgeText } = planBadgeMeta(plan.action);
    updatePlanFab(plan);

    const s = plan.stats || {};
    const t = plan.thresholds || {};
    const bmName = s.benchmark || 'SPY';
    const relStr = planFmtSignedPct1(s.rel_spy);
    const relClass = s.rel_spy == null ? 'val-neutral' : (s.rel_spy >= 0 ? 'val-pos' : 'val-neg');
    const liveClass = (s.live_total_return || 0) >= 0 ? 'val-pos' : 'val-neg';
    const pctFull = s.cap > 0 ? Math.min(100, Math.max(0, (s.invested / s.cap) * 100)) : 0;

    const statCards = [
        { label: '已投 / 上限', value: `${planFmtUsd(s.invested)} / ${planFmtUsd(s.cap)}` },
        { label: `我的收益 (${s.n_deposits || 0}笔)`, value: planFmtSignedPct1(s.live_total_return), cls: liveClass },
        { label: `策略 vs ${bmName}`, value: relStr, cls: relClass },
        { label: '策略峰值回撤', value: planFmtSignedPct1(s.live_max_drawdown), cls: 'val-neg' },
    ].map(c =>
        `<div class="plan-stat">
            <div class="plan-stat-label">${c.label}</div>
            <div class="plan-stat-value ${c.cls || ''}">${c.value}</div>
        </div>`
    ).join('');

    const checks = (plan.checks || []).map(c =>
        `<div class="plan-check ${c.ok ? 'plan-check-ok' : 'plan-check-bad'}">
            <span class="plan-check-icon">${c.ok ? '✓' : '✕'}</span>
            <span><span class="plan-check-label">${c.label}</span>${c.detail ? ` — <span class="plan-check-detail">${c.detail}</span>` : ''}</span>
        </div>`
    ).join('');

    const estLine = s.invested > 0
        ? `<div class="plan-est">当前市值粗估 <strong>${planFmtUsd(s.est_value)}</strong>（按各笔入金月份起分别吃到的策略月收益累乘）</div>`
        : '';

    const foot = `规则：信号驱动加仓（每次一档 ${planFmtUsd(s.tranche)}，加到上限 ${planFmtUsd(s.cap)} 为止）；`
        + `策略失效止损（策略回撤破 ${((t.stop_drawdown || 0) * 100).toFixed(0)}%，`
        + `或满 ${t.stop_min_months || 0} 个月后策略累计低于 ${((t.stop_live_return || 0) * 100).toFixed(0)}% 且相对 ${bmName} 落后 ${((t.stop_rel_spy || 0) * 100).toFixed(0)}%）。`
        + `首笔入金 ${s.live_start_month || '—'}。数值保存在本机浏览器，换设备需重新填写。`;

    result.innerHTML = `
        <div class="plan-verdict">
            <span class="plan-badge ${badgeClass}">${badgeText}</span>
            <div class="plan-verdict-text">
                <div class="plan-headline">${plan.headline}</div>
                <div class="plan-reason">${plan.reason}</div>
            </div>
        </div>
        <div class="plan-body">
            <div class="plan-next"><strong>下一步：</strong>${plan.next_step}</div>
            ${estLine}
            <div class="plan-stats">${statCards}</div>
            <div class="plan-fund-bar"><div class="plan-fund-fill" style="width:${pctFull}%"></div></div>
            <div class="plan-checks-title">健康检查</div>
            ${checks}
            <div class="plan-foot">${foot}</div>
        </div>`;
}

function refreshPositionPlan(container) {
    const inputs = readPlanInputsFromForm(container);
    savePlanInputs(inputs);

function bindPlanFormEvents(container) {
    const onChange = () => refreshPositionPlan(container);
    container.querySelectorAll('#plan-cap, #plan-tranche').forEach(el => {
        el.addEventListener('input', onChange);
        el.addEventListener('change', onChange);
    });
    const list = container.querySelector('#plan-deposits');
    list?.addEventListener('input', onChange);
    list?.addEventListener('change', onChange);
    list?.addEventListener('click', (e) => {
        const btn = e.target.closest('.plan-dep-remove');
        if (!btn) return;
        const row = btn.closest('.plan-deposit-row');
        row?.remove();
        const inputs = readPlanInputsFromForm(container);
        if (!inputs.deposits.length) {
            const d = DATA.position_plan.defaults || {};
            list.innerHTML = depositRowsHtml([{
                month: d.start_month || new Date().toISOString().slice(0, 7),
                amount: 0,
            }]);
        }
        refreshPositionPlan(container);
    });
    container.querySelector('#plan-add-deposit')?.addEventListener('click', () => {
        const inputs = readPlanInputsFromForm(container);
        const last = inputs.deposits[inputs.deposits.length - 1];
        let nextMonth = (DATA.current_month || new Date().toISOString().slice(0, 7));
        if (last && last.month >= nextMonth) {
            const [y, m] = last.month.split('-').map(Number);
            const dt = new Date(y, m - 1 + 1, 1);
            nextMonth = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
        }
        const amount = inputs.tranche || (DATA.position_plan.defaults || {}).tranche || 0;
        inputs.deposits.push({ month: nextMonth, amount });
        container.querySelector('#plan-deposits').innerHTML = depositRowsHtml(inputs.deposits);
        savePlanInputs(inputs);
        renderPlanResult(container, computePositionPlan(inputs));
    });
    container.querySelector('#plan-reset')?.addEventListener('click', () => {
        try {
            localStorage.removeItem(PLAN_STORAGE_KEY);
            localStorage.removeItem('sp_live_plan_v1');
        } catch (_) {}
        renderPositionPlan();
    });
}

function sharpeColorClass(sharpe) {
    const n = Number(sharpe);
    if (Number.isNaN(n)) return 'val-neutral';
    return n >= 1 ? 'val-pos' : 'val-neg';
}

function returnColorClass(ret) {
    if (ret > 0) return 'val-pos';
    if (ret < 0) return 'val-neg';
    return 'val-neutral';
}

function retBadgeClass(ret) {
    if (ret > 0) return 'ret-badge-pos';
    if (ret < 0) return 'ret-badge-neg';
    return 'ret-badge-flat';
}

function renderComparison() {
    const tbody = document.getElementById('comparison-tbody');
    tbody.innerHTML = DATA.comparison_rows.map(r =>
        `<tr>
            <td class="font-medium"><span class="name-cell"><span class="legend-dot" style="background:${r.dot_color}" aria-hidden="true"></span>${r.name}</span></td>
            <td class="${returnColorClass(r.total_return)}">${fmtPct(r.total_return)}</td>
            <td class="${returnColorClass(r.cagr)}">${fmtPct(r.cagr)}</td>
            <td class="val-neg">${fmtPct(r.max_drawdown)}</td>
            <td class="${sharpeColorClass(r.sharpe)}">${Number(r.sharpe).toFixed(2)}</td>
            <td class="val-neutral">${fmtPct(r.win_rate, 0)}</td>
        </tr>`
    ).join('');
}

function formatMonthLabel(ym) {
    if (!ym || typeof ym !== 'string') return 'This Month';
    const parts = ym.split('-');
    if (parts.length < 2) return ym;
    const months = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];
    const mi = parseInt(parts[1], 10) - 1;
    if (mi < 0 || mi > 11) return ym;
    return months[mi];
}

function renderCurrentMonth() {
    const title = document.getElementById('current-month-title');
    if (title) title.textContent = `${formatMonthLabel(DATA.current_month)} so far`;

    const badge = document.getElementById('current-month-badge');
    if (badge) {
        const curve = tvCurrentMonthCurve || [];
        if (curve.length === 0) {
            badge.innerHTML = '';
        } else {
            const val = curve[curve.length - 1].value * 100;
            const cls = val >= 0 ? 'val-pos' : 'val-neg';
            badge.innerHTML = `<span class="${cls}">${(val >= 0 ? '+' : '') + val.toFixed(2)}%</span>`;
        }
    }

    const container = document.getElementById('current-month-cards');
    if (!container) return;

    const holdings = (DATA.details_by_month && DATA.details_by_month[DATA.current_month]) || [];
    if (holdings.length === 0) {
        container.innerHTML =
            `<div class="empty-state">In cash this month, or no holdings yet</div>`;
        return;
    }

    const rows = holdings.map(raw => {
        const d = holdingFields(raw);
        const tRetClass = returnColorClass(d.monthly_return);
        const tRetStr = (d.monthly_return * 100 >= 0 ? '+' : '') + (d.monthly_return * 100).toFixed(2) + '%';
        const scoreStr = ((d.total_score ?? 0) * 100).toFixed(1);
        return `<tr>
            <td class="font-medium">${d.ticker}</td>
            <td class="val-neutral">${scoreStr}</td>
            <td class="${tRetClass}">${tRetStr}</td>
            <td>${d.buy_price.toFixed(2)}</td>
            <td>${d.sell_price.toFixed(2)}</td>
        </tr>`;
    }).join('');

    container.innerHTML = `<div class="panel table-scroll">
        <table class="data-table holdings-table">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Score</th>
                    <th>Return</th>
                    <th>Entry</th>
                    <th>Last</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;
}

let selectedYear = '';

// ===== Year filter + monthly cards =====
function renderYearButtons() {
    const row = document.getElementById('year-btn-row');
    if (!row) return;
    const years = DATA.years || [];
    selectedYear = years.includes(defaultYear) ? defaultYear : (years[0] || '');
    row.innerHTML = years.map(y =>
        `<button type="button" class="year-btn${y === selectedYear ? ' is-active' : ''}" data-year="${y}" aria-pressed="${y === selectedYear}">${y}</button>`
    ).join('');
    row.querySelectorAll('.year-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            selectedYear = btn.dataset.year;
            row.querySelectorAll('.year-btn').forEach(b => {
                const active = b.dataset.year === selectedYear;
                b.classList.toggle('is-active', active);
                b.setAttribute('aria-pressed', active ? 'true' : 'false');
            });
            filterByYear();
        });
    });
}

function renderMonthlyCards() {
    renderYearButtons();

    const container = document.getElementById('monthly-cards');
    container.innerHTML = DATA.monthly_data.map(m => {
        const retClass = retBadgeClass(m.monthly_return);
        const retStr = (m.monthly_return * 100 >= 0 ? '+' : '') + (m.monthly_return * 100).toFixed(2) + '%';
        const details = DATA.details_by_month[m.month] || [];
        let tableHtml;
        if (details.length > 0) {
            const rows = details.map(raw => {

                const tRetClass = returnColorClass(d.monthly_return);
                const tRetStr = (d.monthly_return * 100 >= 0 ? '+' : '') + (d.monthly_return * 100).toFixed(2) + '%';
                return `<tr>

                    <td>${d.buy_price.toFixed(2)}</td>
                    <td>${d.sell_price.toFixed(2)}</td>
                    <td class="${tRetClass}">${tRetStr}</td>
                </tr>`;
            }).join('');
            const padCount = Math.max(0, 5 - details.length);

                '<tr class="month-card-pad"><td>—</td><td>—</td><td>—</td><td>—</td></tr>'
            ).join('');
            tableHtml = `<table>
                <thead><tr><th>Ticker</th><th>Entry</th><th>Exit</th><th>Return</th></tr></thead>
                <tbody>${rows}${padRows}</tbody>

        } else {
            // Cash placeholder: elegant centered design with icon-like element
            tableHtml = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:158px;padding:1.5rem 1rem;gap:0.75rem;">

                <div style="font-family:var(--font-mono);font-size:0.875rem;color:var(--text-muted);letter-spacing:0.02em;">Cash Position</div>
                <div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-subtle);text-align:center;">No holdings this month</div>

        return `<div class="month-card" data-year="${monthYear(m)}" data-month="${m.month}">

                </div>
                <div class="ret-badge ${retClass}">${retStr}</div>
            </div>
            ${tableHtml}
        </div>`;
    }).join('');
}

// Soft green / red tuned to the warm cream page (MotherDuck-adjacent palette)
const HIST_POS = '#5a9e6f';
const HIST_NEG = '#d96b5c';
const MD_INK = '#383838';
const MD_MUTED = '#6b6560';
const MD_GRID = 'rgba(56,56,56,0.08)';
const MD_AXIS = 'rgba(56,56,56,0.18)';
const MD_FONT = 'Inter, system-ui, sans-serif';

function showChartError(container, msg) {
    container.innerHTML = `<div style="padding:12px;color:#b91c1c;font-size:12px;background:#fef2f2;border-radius:6px;">${msg}</div>`;
}

function waitForCharts(callback, container, failMsg) {
    if (typeof Plotly !== 'undefined' && typeof Plotly.newPlot === 'function') {
        callback();
        return;
    }
    let attempts = 0;
    const iv = setInterval(() => {
        attempts++;
        if (typeof Plotly !== 'undefined' && typeof Plotly.newPlot === 'function') {
            clearInterval(iv);
            callback();
        } else if (attempts > 20) {
            clearInterval(iv);
            if (container) container.innerHTML = `<div style="padding:12px;color:#666;font-size:12px;">${failMsg}</div>`;
        }
    }, 100);
}

function isNarrowViewport(container) {
    const w = (container && container.clientWidth) || (typeof window !== 'undefined' ? window.innerWidth : 800);
    return w < 560;
}

/** Pick evenly spaced category labels so mobile x-axes stay readable. */
function sparseCategoryTicks(labels, maxTicks) {
    const n = labels.length;
    if (n === 0) return { tickmode: 'array', tickvals: [], ticktext: [] };
    const max = Math.max(2, maxTicks);
    if (n <= max) {
        return { tickmode: 'array', tickvals: labels, ticktext: labels };
    }
    const show = new Set();
    for (let i = 0; i < max; i++) {
        show.add(Math.round(i * (n - 1) / (max - 1)));
    }
    // Keep every category slot so the axis span is correct; blank out skipped labels
    return {
        tickmode: 'array',
        tickvals: labels,
        ticktext: labels.map((lab, i) => (show.has(i) ? lab : '')),
    };
}

function shortDayLabel(isoDate) {
    // "2026-07-01" -> "7/1"
    const s = String(isoDate || '');
    const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (!m) return s;
    return `${Number(m[2])}/${Number(m[3])}`;
}

function shortMonthLabel(ym, narrow) {
    // "2020-01" -> "20-01" on narrow screens
    const s = String(ym || '');
    if (s.length >= 7 && narrow) return s.slice(2, 7);
    return s.length >= 7 ? s.slice(0, 7) : s;
}

function seriesXY(points) {
    const x = [];
    const y = [];
    (points || []).forEach(p => {
        if (!p || p.value === undefined || p.value === null) return;
        x.push(p.time);
        y.push(p.value);
    });
    return { x, y };
}

function baseLayout(height, extras = {}) {
    const { xaxis: xExtra = {}, yaxis: yExtra = {}, margin: marginExtra, ...rest } = extras;
    return {
        height,
        margin: { l: 48, r: 16, t: 28, b: 40, ...(marginExtra || {}) },
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        font: {
            family: MD_FONT,
            size: 12,
            color: MD_MUTED,
        },
        hovermode: 'x unified',
        // -1: show unified hover anywhere in the plot (sparse series like MTD still work)
        hoverdistance: -1,
        spikedistance: -1,
        hoverlabel: {
            bgcolor: '#f8f8f7',
            bordercolor: MD_INK,
            font: { family: MD_FONT, size: 12, color: MD_INK, shadow: 'none' },
            align: 'left',
        },
        legend: {
            orientation: 'h',
            yanchor: 'bottom',
            y: 1.08,
            xanchor: 'left',
            x: 0,
            font: { size: 11, color: MD_MUTED, family: MD_FONT },
            bgcolor: 'rgba(0,0,0,0)',
            borderwidth: 0,
        },
        xaxis: {
            showgrid: false,
            showline: true,
            linecolor: MD_AXIS,
            linewidth: 1,
            ticks: '',
            tickfont: { size: 11, color: MD_MUTED, family: MD_FONT },
            automargin: true,
            zeroline: false,
            // Soft dashed crosshair; underlay opacity killed via CSS so dash gaps stay clear
            showspikes: true,
            spikemode: 'across',
            spikesnap: 'data',
            spikedash: 'dash',
            spikecolor: 'rgba(56,56,56,0.35)',
            spikethickness: 1,
            ...xExtra,
        },
        yaxis: {
            showgrid: true,
            gridcolor: MD_GRID,
            gridwidth: 1,
            showline: false,
            ticks: '',
            tickfont: { size: 11, color: MD_MUTED, family: MD_FONT },
            automargin: true,
            zeroline: true,
            zerolinecolor: 'rgba(56,56,56,0.22)',
            zerolinewidth: 1,
            ...yExtra,
        },
        ...rest,
    };
}

const PLOT_CONFIG = {
    displayModeBar: false,
    responsive: true,
    staticPlot: false,
};

function plotChart(container, traces, layout) {
    return Plotly.newPlot(container, traces, layout, PLOT_CONFIG).then(() => {
        // Snap 1px SVG strokes to the pixel grid so borders/spikes don't look thicker at some positions
        const snapOverlayStrokes = () => {
            requestAnimationFrame(() => {
                container.querySelectorAll('.spikeline[stroke-dasharray]').forEach(el => {
                    const x1 = el.getAttribute('x1');
                    const x2 = el.getAttribute('x2');
                    if (x1 != null && x1 === x2) {
                        const x = Math.round(parseFloat(x1)) + 0.5;
                        el.setAttribute('x1', x);
                        el.setAttribute('x2', x);
                    }
                    const y1 = el.getAttribute('y1');
                    const y2 = el.getAttribute('y2');
                    if (y1 != null && y1 === y2) {
                        const y = Math.round(parseFloat(y1)) + 0.5;
                        el.setAttribute('y1', y);
                        el.setAttribute('y2', y);
                    }
                });
                // Unified hover box = legend group; Plotly places it at fractional lx-1/ly-1
                container.querySelectorAll('.hoverlayer g.legend').forEach(el => {
                    const t = el.getAttribute('transform') || '';
                    const m = /translate\(([^,\s]+)[,\s]+([^)]+)\)/.exec(t);
                    if (!m) return;
                    const x = Math.round(parseFloat(m[1])) + 0.5;
                    const y = Math.round(parseFloat(m[2])) + 0.5;
                    el.setAttribute('transform', `translate(${x},${y})`);
                });
                container.querySelectorAll('.hoverlayer g.legend rect.bg').forEach(el => {
                    ['x', 'y', 'width', 'height'].forEach(attr => {
                        const v = el.getAttribute(attr);
                        if (v == null) return;
                        el.setAttribute(attr, Math.round(parseFloat(v)));
                    });
                });
            });
        };
        container.on('plotly_hover', snapOverlayStrokes);
        container.on('plotly_relayout', snapOverlayStrokes);
        const resize = () => {
            try { Plotly.Plots.resize(container); } catch (e) {}
        };
        window.addEventListener('resize', resize);
        requestAnimationFrame(resize);
    });
}

function initMultiLineChart(containerId, seriesMap, options = {}) {
    const container = document.getElementById(containerId);
    if (!container || !seriesMap || Object.keys(seriesMap).length === 0) return;
    const height = options.height || 300;
    try {
        const traces = [];
        let xMin = null;
        let xMax = null;
        Object.keys(seriesMap).forEach(name => {
            const { x, y } = seriesXY(seriesMap[name]);
            if (!x.length) return;
            if (xMin == null || x[0] < xMin) xMin = x[0];
            if (xMax == null || x[x.length - 1] > xMax) xMax = x[x.length - 1];
            const color = chartColors[name] || '#6b7280';
            const isStrategy = name === STRATEGY_KEY;
            const lw = options.lineWidth
                ? options.lineWidth(name)
                : (isStrategy ? 2.5 : 1.75);
            traces.push({
                type: 'scatter',
                mode: 'lines',
                name,
                x,
                y,
                line: {
                    color,
                    width: lw,
                    shape: 'spline',
                    smoothing: 0.6,
                },
                hovertemplate: options.hoverTemplate
                    || ('%{fullData.name}: %{y:.2f}<extra></extra>'),
            });
        });
        if (!traces.length) return;
        const xaxis = {
            ...(options.xaxis || {}),
        };
        if (xMin != null && xMax != null && !xaxis.range) {
            xaxis.range = [xMin, xMax];
        }
        const layout = baseLayout(height, {
            showlegend: traces.length > 1,
            yaxis: options.yaxis || {},
            xaxis,
            margin: options.margin,
        });
        plotChart(container, traces, layout).catch(err => {
            console.error(containerId, err);
            showChartError(container, options.errorMsg || 'Chart failed to render');
        });
    } catch (err) {
        console.error(containerId, err);
        showChartError(container, options.errorMsg || 'Chart failed to render');
    }
}

function initBarChart(containerId, data, options = {}) {
    const container = document.getElementById(containerId);
    if (!container || !data || data.length === 0) return;
    const height = options.height || 300;
    try {
        const x = data.map(d => d.x);
        const y = data.map(d => d.y);
        const colors = data.map(d => d.color || options.color || HIST_POS);
        const customdata = data.map(d => d.label || d.x);
        const trace = {
            type: 'bar',
            x,
            y,
            customdata,
            marker: {
                color: colors,
                line: { width: 0 },
            },
            hovertemplate: options.hoverTemplate
                || '%{customdata}<br>%{y}<extra></extra>',
            cliponaxis: false,
        };
        const layout = baseLayout(height, {
            showlegend: false,
            bargap: options.bargap != null ? options.bargap : 0.18,
            // Match equity curve: hover anywhere along x, not only on the bar glyph
            hovermode: options.hovermode || 'x unified',
            yaxis: options.yaxis || {},
            xaxis: options.xaxis || {},
            margin: options.margin || { l: 52, r: 18, t: 18, b: 48 },
        });
        plotChart(container, [trace], layout).catch(err => {
            console.error(containerId, err);
            showChartError(container, options.errorMsg || 'Chart failed to render');
        });
    } catch (err) {
        console.error(containerId, err);
        showChartError(container, options.errorMsg || 'Chart failed to render');
    }
}

function filterByYear() {
    const year = selectedYear;
    const allCards = Array.from(document.querySelectorAll('#monthly-cards .month-card'));
    const container = document.getElementById('monthly-cards');

    allCards.forEach(card => {
        card.classList.remove('is-visible');
        card.style.display = '';
    });

    let yearCards = [];
    if (year) {
        yearCards = allCards.filter(card => card.dataset.year === year);
        yearCards.sort((a, b) => b.dataset.month.localeCompare(a.dataset.month));
    } else {
        yearCards = allCards;
    }

    yearCards.forEach(card => {
        container.appendChild(card);
        card.classList.add('is-visible');
    });

    const retDisplay = document.getElementById('year-return-display');
    if (retDisplay) {
        if (year && annualReturns[year] !== undefined) {
            const ret = annualReturns[year];
            const retStr = (ret * 100).toFixed(2) + '%';
            const retClass = ret >= 0 ? 'val-pos' : 'val-neg';
            retDisplay.innerHTML = `<span class="${retClass}">Year return ${retStr}</span>`;
        } else {
            retDisplay.innerHTML = '';
        }
    }
}

function initCurrentMonthCurve() {
    const container = document.getElementById('tv-current-month-chart');
    if (!container) return;
    const curve = tvCurrentMonthCurve || [];
    if (curve.length === 0) {
        container.innerHTML = `<div style="padding:12px;color:var(--text-muted);font-size:12px;">No holdings data for this month</div>`;
        return;
    }
    const last = curve[curve.length - 1]?.value ?? 0;
    const lineColor = last >= 0 ? HIST_POS : HIST_NEG;
    const fillColor = last >= 0 ? 'rgba(90,158,111,0.14)' : 'rgba(217,107,92,0.14)';
    waitForCharts(() => {
        try {
            const { x, y } = seriesXY(curve);
            const narrow = isNarrowViewport(container);
            const traces = [{
                type: 'scatter',
                mode: 'lines',
                name: 'MTD',
                x,
                y,
                line: { color: lineColor, width: 2.5, shape: 'spline', smoothing: 0.6 },
                fill: 'tozeroy',
                fillcolor: fillColor,
                // Unified hover already shows the date — only emit the return
                hovertemplate: '%{y:.2%}<extra></extra>',
            }];
            const layout = baseLayout(narrow ? 260 : 300, {
                showlegend: false,
                hovermode: 'x unified',
                yaxis: {
                    tickformat: '.1%',
                },
                xaxis: {
                    type: 'date',
                    tickformat: '%m/%d',
                    hoverformat: '%Y-%m-%d',
                    nticks: narrow ? 3 : Math.min(x.length, 8),
                    tickangle: narrow ? -40 : 0,
                    tickfont: { size: narrow ? 10 : 11 },
                },
                margin: { l: 44, r: 12, t: 16, b: narrow ? 56 : 40 },
            });
            plotChart(container, traces, layout).catch(err => {
                console.error('tv-current-month-chart', err);
                showChartError(container, 'Failed to render this month\'s return curve. Please refresh.');
            });
        } catch (err) {
            console.error('tv-current-month-chart', err);
            showChartError(container, 'Failed to render this month\'s return curve. Please refresh.');
        }
    }, container, 'Chart library failed to load. Check your network and refresh.');
}

function initEquityChart() {
    const container = document.getElementById('tv-equity-chart');
    const narrow = isNarrowViewport(container);
    waitForCharts(() => initMultiLineChart('tv-equity-chart', tvEquityData, {
        height: narrow ? 300 : 420,
        lineWidth: (name) => name === STRATEGY_KEY ? 2.75 : 1.75,
        // Unified hover already shows the date once — only emit series + value
        hoverTemplate: '%{fullData.name}: %{y:.2f}<extra></extra>',
        yaxis: { tickformat: ',.1f' },
        xaxis: {
            tickformat: narrow ? '%y-%m' : '%Y-%m',
            nticks: narrow ? 4 : 8,
            tickangle: narrow ? -35 : 0,
            tickfont: { size: narrow ? 10 : 11 },
        },
        margin: { l: 44, r: 12, t: narrow ? 36 : 28, b: narrow ? 56 : 40 },
        errorMsg: 'Failed to render equity curve. Please refresh.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}

function initMonthlyReturnsChart() {
    const container = document.getElementById('tv-monthly-chart');
    const monthly = (DATA.monthly_data || []).filter(
        m => !String(m.sell_date || '').includes('(open)')
    );
    const narrow = isNarrowViewport(container);
    // Date axis + nticks: evenly spaced labels (like equity), not blank slots under some bars
    const data = monthly.map(m => ({
        x: String(m.month || '').length === 7 ? `${m.month}-01` : m.month,
        y: m.monthly_return,
        label: m.month,
        color: m.monthly_return >= 0 ? HIST_POS : HIST_NEG,
    }));
    waitForCharts(() => initBarChart('tv-monthly-chart', data, {
        bargap: 0.18,
        // Unified hover already shows the month — only emit the return
        hoverTemplate: '%{y:.2%}<extra></extra>',
        yaxis: { tickformat: '.0%' },
        xaxis: {
            type: 'date',
            tickformat: narrow ? '%y-%m' : '%Y-%m',
            hoverformat: '%Y-%m',
            nticks: narrow ? 4 : 10,
            tickangle: narrow ? -45 : 0,
            tickfont: { size: narrow ? 10 : 11 },
        },
        margin: { l: 44, r: 10, t: 16, b: narrow ? 60 : 48 },
        height: narrow ? 260 : 300,
        errorMsg: 'Failed to render monthly returns. Please refresh.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}

function initReturnDistChart() {
    const container = document.getElementById('tv-return-dist-chart');
    const raw = tvReturnDistData || [];
    if (!raw.length) return;
    const pcts = raw.map(d => Number(d.pct));
    const minPct = Math.min(...pcts);
    const maxPct = Math.max(...pcts);
    const pad = Math.max(2, (maxPct - minPct) * 0.04);
    const data = raw.map(d => ({
        x: d.pct,
        y: d.value,
        label: `${Number(d.pct).toFixed(1)}%`,
        color: d.pct >= 0 ? HIST_POS : HIST_NEG,
    }));
    waitForCharts(() => initBarChart('tv-return-dist-chart', data, {
        bargap: 0.06,
        // Unified hover already shows the bin — only emit the count
        hoverTemplate: 'Count: %{y}<extra></extra>',
        yaxis: { tickformat: 'd' },
        xaxis: {
            type: 'linear',
            ticksuffix: '%',
            tickformat: '.0f',
            range: [minPct - pad, maxPct + pad],
        },
        margin: { l: 48, r: 12, t: 18, b: 42 },
        errorMsg: 'Failed to render return distribution.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}
