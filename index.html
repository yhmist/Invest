<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Picker · as of 2026-07-09</title>
    <meta name="description" content="Russell 1000 monthly momentum backtest report. As of 2026-07-09. Period: 2019-12 – 2026-06.">
    <meta property="og:title" content="Stock Picker · as of 2026-07-09">
    <meta property="og:description" content="Russell 1000 monthly momentum backtest report. As of 2026-07-09. Period: 2019-12 – 2026-06.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Stock Picker · as of 2026-07-09">
    <meta name="twitter:description" content="Russell 1000 monthly momentum backtest report. As of 2026-07-09. Period: 2019-12 – 2026-06.">
    <script src="https://cdn.plot.ly/plotly-basic-2.35.2.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4efea;
            --bg-deep: #ebe4db;
            --surface: #f8f8f7;
            --surface-muted: #efe9e2;
            --ink: #383838;
            --text: #383838;
            --text-muted: #6b6560;
            --text-subtle: #8a837c;
            --border: #383838;
            --border-soft: rgba(56, 56, 56, 0.18);
            --accent: #97d4ff;
            --accent-deep: #6fc2ff;
            --yellow: #ffde00;
            --orange: #ff9538;
            --pos: #16a34a;
            --neg: #e11d48;
            --radius: 2px;
            /* Inter via Google Fonts */
            --font-display: 'Inter', system-ui, sans-serif;
            --font-mono: 'Inter', system-ui, sans-serif;
            --font-fono: 'Inter', system-ui, sans-serif;
            --font-weight-body: 400;
            --font-weight-strong: 600;
            --letter-spacing-body: 0.01em;
            --letter-spacing-wide: 0.06em;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: var(--font-mono);
            font-weight: var(--font-weight-body);
            font-optical-sizing: auto;
            letter-spacing: var(--letter-spacing-body);
            background:
                radial-gradient(circle at 12% 8%, rgba(151, 212, 255, 0.28), transparent 28%),
                radial-gradient(circle at 88% 0%, rgba(255, 222, 0, 0.22), transparent 24%),
                radial-gradient(circle at 80% 70%, rgba(255, 149, 56, 0.12), transparent 30%),
                var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .page { max-width: 1120px; margin: 0 auto; padding: 2rem 1.5rem 4.5rem; }
        .font-display {
            font-family: var(--font-display);
            font-weight: var(--font-weight-strong);
            letter-spacing: var(--letter-spacing-wide);
            text-transform: uppercase;
        }
        .font-mono { font-family: var(--font-mono); font-weight: var(--font-weight-body); }
        .font-medium { font-weight: 500; }
        .font-semibold, strong, b { font-weight: 600; }
        .signals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        @media (min-width: 640px) { .signals-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .signals-grid { grid-template-columns: repeat(5, 1fr); } }
        .month-cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        @media (min-width: 640px) { .month-cards-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .month-cards-grid { grid-template-columns: repeat(3, 1fr); } }
        .top-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--yellow);
            border-bottom: 1.5px solid var(--ink);
            color: var(--ink);
            font-family: var(--font-fono);
            font-size: 0.75rem;
            font-weight: var(--font-weight-strong);
            letter-spacing: var(--letter-spacing-wide);
            text-transform: uppercase;
            text-align: center;
            padding: 0.55rem 1rem;
            line-height: 1.2;
        }
        .site-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1.1rem 0 1.6rem;
            border-bottom: 1.5px solid var(--ink);
            margin-bottom: 2rem;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .brand-mark {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            background: var(--orange);
            border: 1.5px solid var(--ink);
            flex-shrink: 0;
        }
        .brand-name {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: var(--font-weight-strong);
            letter-spacing: var(--letter-spacing-wide);
            color: var(--ink);
            line-height: 1;
        }
        .date-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            color: var(--ink);
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            padding: 0.4rem 0.75rem;
            white-space: nowrap;
            line-height: 1;
        }
        .panel {
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
        }
        .panel-padded { padding: 1.35rem 1.4rem; }
        .section-block { margin-bottom: 2rem; }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.9rem;
            gap: 1rem;
        }
        .section-title {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: var(--font-weight-strong);
            color: var(--ink);
            letter-spacing: var(--letter-spacing-body);
            text-transform: none;
            line-height: 1.2;
        }
        .section-title::before {
            content: '';
            display: block;
            width: 0.55rem;
            height: 0.55rem;
            background: var(--accent);
            border: 1.5px solid var(--ink);
            flex-shrink: 0;
        }
        .section-subtitle {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--ink);
            text-transform: none;
            letter-spacing: 0.02em;
            margin-bottom: 0.85rem;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.85rem;
        }
        @media (min-width: 768px) { .metric-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .metric-grid.performance-grid { grid-template-columns: repeat(4, 1fr); } }
        .metric-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            padding: 1rem 1.05rem;
            min-height: 5.25rem;
        }
        .metric-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            line-height: 1.25;
        }
        .metric-value {
            margin-top: 0.55rem;
            font-family: var(--font-mono);
            font-size: 1.55rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.01em;
            line-height: 1.15;
            color: var(--ink);
        }
        #signals-container .metric-card {
            min-height: 4rem;
            align-items: center;
            justify-content: center;
        }
        #signals-container .metric-value {
            margin-top: 0;
        }
        .val-pos { color: var(--pos); }
        .val-neg { color: var(--neg); }
        .val-neutral { color: var(--text-muted); }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }
        .data-table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }
        .data-table th {
            text-align: left;
            padding: 0.7rem 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            border-bottom: 1.5px solid var(--ink);
            background: var(--surface-muted);
            white-space: nowrap;
            vertical-align: middle;
            line-height: 1.2;
        }
        .data-table th:not(:first-child) { text-align: right; }
        .data-table td {
            padding: 0.8rem 0.75rem;
            border-bottom: 1px solid var(--border-soft);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            vertical-align: middle;
            line-height: 1.2;
        }
        .data-table td:not(:first-child) { text-align: right; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tbody tr:hover { background: rgba(151, 212, 255, 0.18); }
        .data-table th:first-child,
        .data-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 1;
            width: 1%;
            max-width: 7.5rem;
            background: var(--surface);
            box-shadow: 1px 0 0 var(--border-soft);
        }
        .data-table thead th:first-child { background: var(--surface-muted); z-index: 2; }
        .data-table tbody tr:hover td:first-child { background: #e8f5ff; }
        /* Compact holdings book: no sticky overlay, ticker fits content */
        .holdings-table { min-width: 0; table-layout: auto; }
        .holdings-table th:first-child,
        .holdings-table td:first-child {
            position: static;
            left: auto;
            z-index: auto;
            width: 1%;
            max-width: none;
            box-shadow: none;
            padding-right: 0.5rem;
        }
        .holdings-table thead th:first-child { z-index: auto; }
        /* Even metric columns for Strategy vs Benchmarks */
        .comparison-table {
            table-layout: fixed;
            min-width: 640px;
        }
        .comparison-table th:first-child,
        .comparison-table td:first-child {
            width: 18%;
            max-width: none;
        }
        .comparison-table th:not(:first-child),
        .comparison-table td:not(:first-child) {
            width: 16.4%;
        }
        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1px solid var(--ink);
            margin-right: 0.5rem;
            vertical-align: middle;
            flex-shrink: 0;
        }
        .data-table .name-cell {
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }
        .chart-panel {
            position: relative;
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            padding: 0.85rem 0.65rem 0.55rem 0.35rem;
            overflow: hidden;
        }
        .chart-panel .chart-canvas {
            width: 100%;
            height: 300px;
        }
        .chart-panel.chart-tall .chart-canvas { height: 420px; }
        .chart-panel .js-plotly-plot .plotly .modebar { display: none !important; }
        .chart-panel .js-plotly-plot .plotly .main-svg {
            border-radius: 1px;
        }
        /* Match Plotly zoom/legend tips to page palette */
        .plotly-notifier {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: var(--letter-spacing-body);
        }
        .plotly-notifier .notifier-note {
            min-width: 180px;
            max-width: 260px;
            background: var(--surface);
            color: var(--ink);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            padding: 0.65rem 0.75rem;
            box-shadow: none;
        }
        .plotly-notifier .notifier-close {
            color: var(--text-muted);
            opacity: 1;
            font-weight: 600;
            line-height: 1;
            padding: 0 0.15rem;
        }
        .plotly-notifier .notifier-close:hover {
            color: var(--ink);
        }
        /* Plotly paints an opaque bg underlay under dashed spikes; hide it so gaps are transparent */
        .chart-panel .js-plotly-plot .spikeline:not([stroke-dasharray]) {
            stroke-opacity: 0 !important;
        }
        /* Avoid crispEdges rounding that makes the dash look thicker at some x positions */
        .chart-panel .js-plotly-plot .spikeline {
            shape-rendering: geometricPrecision;
        }
        /* Unified hover is a legend .bg rect; crispEdges + subpixel x/y makes one side look thicker */
        .chart-panel .js-plotly-plot .hoverlayer .legend .bg {
            shape-rendering: geometricPrecision;
        }
        .chart-panel .js-plotly-plot .hoverlayer text {
            text-shadow: none !important;
        }
        .mtd-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            font-weight: 400;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
            line-height: 1;
            min-height: 1.5rem;
        }
        .year-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.65rem 0.85rem;
            margin-bottom: 1.25rem;
        }
        .year-btn-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.45rem;
        }
        #year-return-display {
            display: inline-flex;
            align-items: center;
            min-height: 28.8px;
            line-height: 1;
            font-family: var(--font-display);
            font-size: 0.875rem;
            font-weight: var(--font-weight-strong);
            letter-spacing: var(--letter-spacing-body);
            min-width: 100px;
        }
        /* MotherDuck docs "Copy" button style */
        .year-btn {
            appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            background: #ffffff;
            border: 1px solid var(--ink);
            border-radius: 2px;
            padding: 4px 12px;
            min-height: 28.8px;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: normal;
            text-transform: none;
            color: var(--ink);
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.12s ease, border-color 0.12s ease;
        }
        .year-btn:hover {
            background: var(--surface-muted);
        }
        .year-btn.is-active {
            background: var(--accent);
            border-color: var(--ink);
        }
        .year-btn:focus-visible {
            outline: 2px solid var(--accent-deep);
            outline-offset: 2px;
        }
        .month-card {
            font-size: 0.8125rem;
            line-height: 1.3;
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            padding: 0.9rem;
            display: flex;
            flex-direction: column;
        }
        .month-card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
            min-height: 1.5rem;
        }
        .month-card-title {
            font-size: 13px;
            letter-spacing: -0.01em;
            line-height: 1.2;
        }
        .month-card-dates {
            margin-top: 0.125rem;
            font-size: 10px;
            color: var(--text-subtle);
            line-height: 1.2;
        }
        #monthly-cards .month-card { display: none; }
        #monthly-cards .month-card.is-visible {
            display: flex;
            /* Match full 5-ticker book height so cash months don't shrink */
            min-height: 214px;
        }
        .month-card table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            margin-top: 0.55rem;
        }
        .month-card tr.month-card-pad td {
            padding: 0.4rem 0.25rem;
            border-bottom: 1px solid transparent;
            line-height: 1.3;
            color: transparent;
            user-select: none;
        }
        .month-card thead th {
            text-align: left;
            padding: 0 0.25rem 0.4rem;
            font-family: var(--font-mono);
            font-size: 0.625rem;
            font-weight: 400;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-soft);
            vertical-align: middle;
            line-height: 1.2;
        }
        .month-card thead th:nth-child(2),
        .month-card thead th:nth-child(3),
        .month-card thead th:nth-child(4) { text-align: right; }
        .month-card td {
            padding: 0.4rem 0.25rem;
            border-bottom: 1px solid var(--border-soft);
            font-variant-numeric: tabular-nums;
            vertical-align: middle;
            line-height: 1.2;
        }
        .month-card td:nth-child(2),
        .month-card td:nth-child(3),
        .month-card td:nth-child(4) { text-align: right; }
        .month-card tbody tr:last-child td { border-bottom: none; }
        .ret-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            align-self: center;
            flex-shrink: 0;
            min-width: 4.25rem;
            height: 1.5rem;
            box-sizing: border-box;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            line-height: 1;
            padding: 0 0.45rem;
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        .ret-badge-pos { background: rgba(22, 163, 74, 0.14); color: var(--pos); }
        .ret-badge-neg { background: rgba(225, 29, 72, 0.1); color: var(--neg); }
        .ret-badge-flat { background: var(--surface-muted); color: var(--text-muted); }
        .empty-state {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            background: var(--surface);
            border: 1.5px dashed var(--ink);
            border-radius: var(--radius);
        }
        .signal-meta {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }
        .year-label {
            display: inline-flex;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--text-subtle);
            line-height: 1;
            min-height: 28.8px;
        }
        @media (max-width: 640px) {
            .page { padding: 1.25rem 1rem 3rem; }
            .site-nav { flex-wrap: wrap; }
            .chart-panel { padding: 0.85rem 0.75rem 0.8rem; }
            .chart-panel.chart-tall .chart-canvas { height: 300px; }
            .chart-panel .chart-canvas { height: 240px; }
        }
    </style>
</head>
<body>
    <div class="top-banner">Russell 1000 · Monthly Momentum</div>
    <div class="page">
        <nav class="site-nav">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true"></span>
                <span class="brand-name">Stock Picker</span>
            </div>
        </nav>

        <section class="section-block" id="current-month-section">
            <div class="section-head">
                <div class="section-title" id="current-month-title"></div>
                <div id="current-month-badge" class="mtd-badge"></div>
            </div>
            <div class="chart-panel" style="margin-bottom: 0.85rem;">
                <div id="tv-current-month-chart" class="chart-canvas"></div>
            </div>
            <div id="current-month-cards"></div>
        </section>

        <section class="section-block">
            <div class="section-head">
                <div>
                    <div class="section-title">Next Open Signal</div>
                    <div class="signal-meta">As of <span id="signal-asof"></span> close</div>
                </div>
                <span class="date-badge" id="signal-next-date"></span>
            </div>
            <div id="signals-container"></div>
        </section>

        <section class="section-block" id="performance-section">
            <div class="section-head">
                <div class="section-title">Performance</div>
                <span class="date-badge" id="date-range"></span>
            </div>
            <div class="metric-grid performance-grid" id="kpi-container"></div>
        </section>

        <section class="section-block" id="benchmarks-section">
            <div class="section-head">
                <div class="section-title">Strategy vs Benchmarks</div>
            </div>
            <div class="panel table-scroll">
                <table class="data-table comparison-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Total return</th>
                            <th>CAGR</th>
                            <th>Max drawdown</th>
                            <th>Sharpe</th>
                            <th>Win rate</th>
                        </tr>
                    </thead>
                    <tbody id="comparison-tbody"></tbody>
                </table>
            </div>
        </section>

        <section class="section-block">
            <div class="section-head">
                <div class="section-title">Equity Curve</div>
            </div>
            <div class="chart-panel chart-tall">
                <div id="tv-equity-chart" class="chart-canvas"></div>
            </div>
        </section>

        <section class="section-block">
            <div class="section-head">
                <div class="section-title">Underwater Plot</div>
            </div>
            <div class="chart-panel">
                <div id="tv-drawdown-chart" class="chart-canvas"></div>
            </div>
        </section>

        <section class="section-block">
            <div class="section-head">
                <div class="section-title">Return Distribution</div>
            </div>
            <div class="chart-panel">
                <div id="tv-return-dist-chart" class="chart-canvas"></div>
            </div>
        </section>

        <section class="section-block">
            <div class="section-head">
                <div class="section-title">Monthly Returns</div>
            </div>
            <div class="chart-panel">
                <div id="tv-monthly-chart" class="chart-canvas"></div>
            </div>
        </section>

        <section class="section-block" id="holdings-by-year-section">
            <div class="section-head">
                <div class="section-title">Holdings by Year</div>
            </div>

        <script>
        // Frontend logic: render dynamic content from #report-data and init charts.
const DATA = JSON.parse(document.getElementById('report-data').textContent);

const annualReturns = DATA.annual_returns;
const chartColors = DATA.colors_map;
const defaultYear = DATA.default_year;
const STRATEGY_KEY = 'Strategy';

/** Expand compact {times, series:{name:[y...]}} or legacy {name:[{time,value}]} into Plotly-ready maps. */
function expandSharedSeries(raw) {
    if (!raw) return {};
    if (raw.times && raw.series) {
        const out = {};
        Object.keys(raw.series).forEach(name => {
            const ys = raw.series[name] || [];
            out[name] = raw.times.map((t, i) => ({ time: t, value: ys[i] }));
        });
        return out;
    }
    return raw;
}

const tvEquityData = expandSharedSeries(DATA.tv_equity_series);
const tvDrawdownSeries = expandSharedSeries(DATA.tv_drawdown_series);
const tvReturnDistData = DATA.tv_return_dist_data;
const tvCurrentMonthCurve = DATA.tv_current_month_curve;

/** Normalize holding row: array [ticker,buy,sell,ret,score] or legacy object. */
function holdingFields(d) {
    if (Array.isArray(d)) {
        return {
            ticker: d[0],
            buy_price: Number(d[1]) || 0,
            sell_price: Number(d[2]) || 0,
            monthly_return: Number(d[3]) || 0,
            total_score: Number(d[4]) || 0,
        };
    }
    return {
        ticker: d.ticker,
        buy_price: Number(d.buy_price) || 0,
        sell_price: Number(d.sell_price) || 0,
        monthly_return: Number(d.monthly_return) || 0,
        total_score: Number(d.total_score) || 0,
    };
}

function monthYear(m) {
    return m.year || (m.month ? String(m.month).slice(0, 4) : '');
}

// ===== Number formatting (matches former Python _fmt_pct) =====
function fmtPct(v, digits = 1) {
    return (v * 100).toFixed(digits) + '%';
}

function fmtSignedPct(v, digits = 2) {
    const pct = v * 100;
    return (pct >= 0 ? '+' : '') + pct.toFixed(digits) + '%';
}

function formatKpiValue(k) {
    const v = k.value;
    if (k.format === 'number') return Number(v).toFixed(2);
    if (k.format === 'pct0') return fmtPct(v, 0);
    return fmtPct(v, 1);
}

function kpiColorClass(k) {
    const label = k.label || '';
    const v = Number(k.value);
    if (label.startsWith('Max drawdown') || label.startsWith('Worst month') || v < 0) {
        return 'val-neg';
    }
    if (label === 'Volatility' || label === 'Win rate') return 'val-neutral';
    if (label === 'Sharpe' || label === 'Sortino' || label === 'Calmar' || label === 'Profit factor') {
        return v >= 1 ? 'val-pos' : 'val-neg';
    }
    return 'val-pos';
}

// ===== Header + next-session signals =====
function renderHeader() {
    document.getElementById('date-range').textContent = DATA.date_range;
    document.getElementById('signal-asof').textContent = DATA.asof_date_str;
    document.getElementById('signal-next-date').textContent = DATA.next_date_str;

    const container = document.getElementById('signals-container');
    if (DATA.next_picks && DATA.next_picks.length > 0) {
        const cards = DATA.next_picks.map(p =>
            `<div class="metric-card" style="text-align:center;">
                <div class="metric-value" style="font-size:1.25rem;">${p.ticker}</div>
                <div class="metric-label" style="margin-top:0.5rem;">Score ${((p.total_score ?? 0) * 100).toFixed(1)}</div>
            </div>`
        ).join('');
        container.innerHTML = `<div class="signals-grid">${cards}</div>`;
    } else {
        container.innerHTML =
            `<div class="empty-state" title="Risk overlay: QQQ 50-day MA below 200-day MA, or no stocks cleared the screen.">Sitting in cash — market filter is off, or no eligible picks</div>`;
    }
}

// ===== KPI cards =====
function renderKPIs() {
    const container = document.getElementById('kpi-container');
    container.innerHTML = DATA.performance_kpis.map(k =>
        `<div class="metric-card">
            <div class="metric-label">${k.label}</div>
            <div class="metric-value ${kpiColorClass(k)}">${formatKpiValue(k)}</div>
        </div>`
    ).join('');
}

// ===== Strategy vs benchmarks table =====
function sharpeColorClass(sharpe) {
    const n = Number(sharpe);
    if (Number.isNaN(n)) return 'val-neutral';
    return n >= 1 ? 'val-pos' : 'val-neg';
}

function returnColorClass(ret) {
    if (ret > 0) return 'val-pos';
    if (ret < 0) return 'val-neg';
    return 'val-neutral';
}

function retBadgeClass(ret) {
    if (ret > 0) return 'ret-badge-pos';
    if (ret < 0) return 'ret-badge-neg';
    return 'ret-badge-flat';
}

function renderComparison() {
    const tbody = document.getElementById('comparison-tbody');
    tbody.innerHTML = DATA.comparison_rows.map(r =>
        `<tr>
            <td class="font-medium"><span class="name-cell"><span class="legend-dot" style="background:${r.dot_color}" aria-hidden="true"></span>${r.name}</span></td>
            <td class="${returnColorClass(r.total_return)}">${fmtPct(r.total_return)}</td>
            <td class="${returnColorClass(r.cagr)}">${fmtPct(r.cagr)}</td>
            <td class="val-neg">${fmtPct(r.max_drawdown)}</td>
            <td class="${sharpeColorClass(r.sharpe)}">${Number(r.sharpe).toFixed(2)}</td>
            <td class="val-neutral">${fmtPct(r.win_rate, 0)}</td>
        </tr>`
    ).join('');
}

function formatMonthLabel(ym) {
    if (!ym || typeof ym !== 'string') return 'This Month';
    const parts = ym.split('-');
    if (parts.length < 2) return ym;
    const months = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];
    const mi = parseInt(parts[1], 10) - 1;
    if (mi < 0 || mi > 11) return ym;
    return months[mi];
}

// ===== Current month: title, MTD badge, holdings =====
function renderCurrentMonth() {
    const title = document.getElementById('current-month-title');
    if (title) title.textContent = `${formatMonthLabel(DATA.current_month)} so far`;

    const badge = document.getElementById('current-month-badge');
    if (badge) {
        const curve = tvCurrentMonthCurve || [];
        if (curve.length === 0) {
            badge.innerHTML = '';
        } else {

            const cls = val >= 0 ? 'val-pos' : 'val-neg';
            badge.innerHTML = `<span class="${cls}">${(val >= 0 ? '+' : '') + val.toFixed(2)}%</span>`;
        }

    const container = document.getElementById('current-month-cards');
    if (!container) return;

// Soft green / red tuned to the warm cream page (MotherDuck-adjacent palette)
const HIST_POS = '#5a9e6f';
const HIST_NEG = '#d96b5c';
const MD_INK = '#383838';
const MD_MUTED = '#6b6560';
const MD_GRID = 'rgba(56,56,56,0.08)';
const MD_AXIS = 'rgba(56,56,56,0.18)';
const MD_FONT = 'Inter, system-ui, sans-serif';

function showChartError(container, msg) {
    container.innerHTML = `<div style="padding:12px;color:#b91c1c;font-size:12px;background:#fef2f2;border-radius:6px;">${msg}</div>`;
}

function waitForCharts(callback, container, failMsg) {
    if (typeof Plotly !== 'undefined' && typeof Plotly.newPlot === 'function') {
        callback();
        return;
    }
    let attempts = 0;
    const iv = setInterval(() => {
        attempts++;
        if (typeof Plotly !== 'undefined' && typeof Plotly.newPlot === 'function') {
            clearInterval(iv);
            callback();
        } else if (attempts > 20) {
            clearInterval(iv);
            if (container) container.innerHTML = `<div style="padding:12px;color:#666;font-size:12px;">${failMsg}</div>`;
        }
    }, 100);
}

function isNarrowViewport(container) {
    const w = (container && container.clientWidth) || (typeof window !== 'undefined' ? window.innerWidth : 800);
    return w < 560;
}

/** Pick evenly spaced category labels so mobile x-axes stay readable. */
function sparseCategoryTicks(labels, maxTicks) {
    const n = labels.length;
    if (n === 0) return { tickmode: 'array', tickvals: [], ticktext: [] };
    const max = Math.max(2, maxTicks);
    if (n <= max) {
        return { tickmode: 'array', tickvals: labels, ticktext: labels };
    }
    const show = new Set();
    for (let i = 0; i < max; i++) {
        show.add(Math.round(i * (n - 1) / (max - 1)));
    }
    // Keep every category slot so the axis span is correct; blank out skipped labels
    return {
        tickmode: 'array',
        tickvals: labels,
        ticktext: labels.map((lab, i) => (show.has(i) ? lab : '')),
    };
}

function shortDayLabel(isoDate) {
    // "2026-07-01" -> "7/1"
    const s = String(isoDate || '');
    const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (!m) return s;
    return `${Number(m[2])}/${Number(m[3])}`;
}

function shortMonthLabel(ym, narrow) {
    // "2020-01" -> "20-01" on narrow screens
    const s = String(ym || '');
    if (s.length >= 7 && narrow) return s.slice(2, 7);
    return s.length >= 7 ? s.slice(0, 7) : s;
}

function seriesXY(points) {
    const x = [];
    const y = [];
    (points || []).forEach(p => {
        if (!p || p.value === undefined || p.value === null) return;
        x.push(p.time);
        y.push(p.value);
    });
    return { x, y };
}

function baseLayout(height, extras = {}) {
    const { xaxis: xExtra = {}, yaxis: yExtra = {}, margin: marginExtra, ...rest } = extras;
    return {
        height,
        margin: { l: 48, r: 16, t: 28, b: 40, ...(marginExtra || {}) },
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        font: {
            family: MD_FONT,
            size: 12,
            color: MD_MUTED,
        },
        hovermode: 'x unified',
        hoverlabel: {
            bgcolor: '#f8f8f7',
            bordercolor: MD_INK,
            font: { family: MD_FONT, size: 12, color: MD_INK, shadow: 'none' },
            align: 'left',
        },
        legend: {
            orientation: 'h',
            yanchor: 'bottom',
            y: 1.08,
            xanchor: 'left',
            x: 0,
            font: { size: 11, color: MD_MUTED, family: MD_FONT },
            bgcolor: 'rgba(0,0,0,0)',
            borderwidth: 0,
        },
        xaxis: {
            showgrid: false,
            showline: true,
            linecolor: MD_AXIS,
            linewidth: 1,
            ticks: '',
            tickfont: { size: 11, color: MD_MUTED, family: MD_FONT },
            automargin: true,
            zeroline: false,
            // Soft dashed crosshair; underlay opacity killed via CSS so dash gaps stay clear
            showspikes: true,
            spikemode: 'across',
            spikesnap: 'data',
            spikedash: 'dash',
            spikecolor: 'rgba(56,56,56,0.35)',
            spikethickness: 1,
            ...xExtra,
        },
        yaxis: {
            showgrid: true,
            gridcolor: MD_GRID,
            gridwidth: 1,
            showline: false,
            ticks: '',
            tickfont: { size: 11, color: MD_MUTED, family: MD_FONT },
            automargin: true,
            zeroline: true,
            zerolinecolor: 'rgba(56,56,56,0.22)',
            zerolinewidth: 1,
            ...yExtra,
        },
        ...rest,
    };
}

const PLOT_CONFIG = {
    displayModeBar: false,
    responsive: true,
    staticPlot: false,
};

function plotChart(container, traces, layout) {
    return Plotly.newPlot(container, traces, layout, PLOT_CONFIG).then(() => {
        // Snap 1px SVG strokes to the pixel grid so borders/spikes don't look thicker at some positions
        const snapOverlayStrokes = () => {
            requestAnimationFrame(() => {
                container.querySelectorAll('.spikeline[stroke-dasharray]').forEach(el => {
                    const x1 = el.getAttribute('x1');
                    const x2 = el.getAttribute('x2');
                    if (x1 != null && x1 === x2) {
                        const x = Math.round(parseFloat(x1)) + 0.5;
                        el.setAttribute('x1', x);
                        el.setAttribute('x2', x);
                    }
                    const y1 = el.getAttribute('y1');
                    const y2 = el.getAttribute('y2');
                    if (y1 != null && y1 === y2) {
                        const y = Math.round(parseFloat(y1)) + 0.5;
                        el.setAttribute('y1', y);
                        el.setAttribute('y2', y);
                    }
                });
                // Unified hover box = legend group; Plotly places it at fractional lx-1/ly-1
                container.querySelectorAll('.hoverlayer g.legend').forEach(el => {
                    const t = el.getAttribute('transform') || '';
                    const m = /translate\(([^,\s]+)[,\s]+([^)]+)\)/.exec(t);
                    if (!m) return;
                    const x = Math.round(parseFloat(m[1])) + 0.5;
                    const y = Math.round(parseFloat(m[2])) + 0.5;
                    el.setAttribute('transform', `translate(${x},${y})`);
                });
                container.querySelectorAll('.hoverlayer g.legend rect.bg').forEach(el => {
                    ['x', 'y', 'width', 'height'].forEach(attr => {
                        const v = el.getAttribute(attr);
                        if (v == null) return;
                        el.setAttribute(attr, Math.round(parseFloat(v)));
                    });
                });
            });
        };
        container.on('plotly_hover', snapOverlayStrokes);
        container.on('plotly_relayout', snapOverlayStrokes);
        const resize = () => {
            try { Plotly.Plots.resize(container); } catch (e) {}
        };
        window.addEventListener('resize', resize);
        requestAnimationFrame(resize);
    });
}

function initMultiLineChart(containerId, seriesMap, options = {}) {
    const container = document.getElementById(containerId);
    if (!container || !seriesMap || Object.keys(seriesMap).length === 0) return;
    const height = options.height || 300;
    try {
        const traces = [];
        let xMin = null;
        let xMax = null;
        Object.keys(seriesMap).forEach(name => {
            const { x, y } = seriesXY(seriesMap[name]);
            if (!x.length) return;
            if (xMin == null || x[0] < xMin) xMin = x[0];
            if (xMax == null || x[x.length - 1] > xMax) xMax = x[x.length - 1];
            const color = chartColors[name] || '#6b7280';
            const isStrategy = name === STRATEGY_KEY;
            const lw = options.lineWidth
                ? options.lineWidth(name)
                : (isStrategy ? 2.5 : 1.75);
            traces.push({
                type: 'scatter',
                mode: 'lines',
                name,
                x,
                y,
                line: {
                    color,
                    width: lw,
                    shape: 'spline',
                    smoothing: 0.6,
                },
                hovertemplate: options.hoverTemplate
                    || ('%{fullData.name}: %{y:.2f}<extra></extra>'),
            });
        });
        if (!traces.length) return;
        const xaxis = {
            ...(options.xaxis || {}),
        };
        if (xMin != null && xMax != null && !xaxis.range) {
            xaxis.range = [xMin, xMax];
        }
        const layout = baseLayout(height, {
            showlegend: traces.length > 1,
            yaxis: options.yaxis || {},
            xaxis,
            margin: options.margin,
        });
        plotChart(container, traces, layout).catch(err => {
            console.error(containerId, err);
            showChartError(container, options.errorMsg || 'Chart failed to render');
        });
    } catch (err) {
        console.error(containerId, err);
        showChartError(container, options.errorMsg || 'Chart failed to render');
    }
}

function initBarChart(containerId, data, options = {}) {
    const container = document.getElementById(containerId);
    if (!container || !data || data.length === 0) return;
    const height = options.height || 300;
    try {
        const x = data.map(d => d.x);
        const y = data.map(d => d.y);
        const colors = data.map(d => d.color || options.color || HIST_POS);
        const customdata = data.map(d => d.label || d.x);
        const trace = {
            type: 'bar',
            x,
            y,
            customdata,
            marker: {
                color: colors,
                line: { width: 0 },
            },
            hovertemplate: options.hoverTemplate
                || '%{customdata}<br>%{y}<extra></extra>',
            cliponaxis: false,
        };
        const layout = baseLayout(height, {
            showlegend: false,
            bargap: options.bargap != null ? options.bargap : 0.18,
            // Match equity curve: hover anywhere along x, not only on the bar glyph
            hovermode: options.hovermode || 'x unified',
            yaxis: options.yaxis || {},
            xaxis: options.xaxis || {},
            margin: options.margin || { l: 52, r: 18, t: 18, b: 48 },
        });
        plotChart(container, [trace], layout).catch(err => {
            console.error(containerId, err);
            showChartError(container, options.errorMsg || 'Chart failed to render');
        });
    } catch (err) {
        console.error(containerId, err);
        showChartError(container, options.errorMsg || 'Chart failed to render');
    }
}

function filterByYear() {
    const year = selectedYear;
    const allCards = Array.from(document.querySelectorAll('#monthly-cards .month-card'));
    const container = document.getElementById('monthly-cards');

    allCards.forEach(card => {
        card.classList.remove('is-visible');
        card.style.display = '';
    });

    let yearCards = [];
    if (year) {
        yearCards = allCards.filter(card => card.dataset.year === year);
        yearCards.sort((a, b) => b.dataset.month.localeCompare(a.dataset.month));
    } else {
        yearCards = allCards;
    }

    yearCards.forEach(card => {
        container.appendChild(card);
        card.classList.add('is-visible');
    });

    const retDisplay = document.getElementById('year-return-display');
    if (retDisplay) {
        if (year && annualReturns[year] !== undefined) {
            const ret = annualReturns[year];
            const retStr = (ret * 100).toFixed(2) + '%';
            const retClass = ret >= 0 ? 'val-pos' : 'val-neg';
            retDisplay.innerHTML = `<span class="${retClass}">Year return ${retStr}</span>`;
        } else {
            retDisplay.innerHTML = '';
        }
    }
}

function initCurrentMonthCurve() {
    const container = document.getElementById('tv-current-month-chart');
    if (!container) return;
    const curve = tvCurrentMonthCurve || [];
    if (curve.length === 0) {
        container.innerHTML = `<div style="padding:12px;color:var(--text-muted);font-size:12px;">No holdings data for this month</div>`;
        return;
    }
    const last = curve[curve.length - 1]?.value ?? 0;
    const lineColor = last >= 0 ? HIST_POS : HIST_NEG;
    const fillColor = last >= 0 ? 'rgba(90,158,111,0.14)' : 'rgba(217,107,92,0.14)';
    waitForCharts(() => {
        try {
            const { x, y } = seriesXY(curve);
            const narrow = isNarrowViewport(container);
            const tickLabels = x.map(shortDayLabel);
            // Few points still crowd on phones — hard-cap visible ticks
            const maxTicks = narrow ? 3 : Math.min(x.length, 8);
            const ticks = sparseCategoryTicks(tickLabels, maxTicks);
            const traces = [{
                type: 'scatter',
                mode: 'lines',
                name: 'MTD',
                x: tickLabels,
                y,
                customdata: x,
                line: { color: lineColor, width: 2.5, shape: 'spline', smoothing: 0.6 },
                fill: 'tozeroy',
                fillcolor: fillColor,
                // Unified hover already shows the date — only emit the return
                hovertemplate: '%{y:.2%}<extra></extra>',
            }];
            const layout = baseLayout(narrow ? 260 : 300, {
                showlegend: false,
                hovermode: 'x unified',
                yaxis: {
                    tickformat: '.1%',
                },
                xaxis: {
                    type: 'category',
                    tickangle: narrow ? -40 : 0,
                    ...ticks,
                    tickfont: { size: narrow ? 10 : 11 },
                },
                margin: { l: 44, r: 12, t: 16, b: narrow ? 56 : 40 },
            });
            plotChart(container, traces, layout).catch(err => {
                console.error('tv-current-month-chart', err);
                showChartError(container, 'Failed to render this month\'s return curve. Please refresh.');
            });
        } catch (err) {
            console.error('tv-current-month-chart', err);
            showChartError(container, 'Failed to render this month\'s return curve. Please refresh.');
        }
    }, container, 'Chart library failed to load. Check your network and refresh.');
}

function initEquityChart() {
    const container = document.getElementById('tv-equity-chart');

    waitForCharts(() => initMultiLineChart('tv-equity-chart', tvEquityData, {

            tickformat: narrow ? '%y-%m' : '%Y-%m',

        margin: { l: 44, r: 12, t: narrow ? 36 : 28, b: narrow ? 56 : 40 },
        errorMsg: 'Failed to render equity curve. Please refresh.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}

function initMonthlyReturnsChart() {
    const container = document.getElementById('tv-monthly-chart');
    const monthly = (DATA.monthly_data || []).filter(
        m => !String(m.sell_date || '').includes('(open)')
    );
    const narrow = isNarrowViewport(container);
    // Date axis + nticks: evenly spaced labels (like equity), not blank slots under some bars
    const data = monthly.map(m => ({
        x: String(m.month || '').length === 7 ? `${m.month}-01` : m.month,
        y: m.monthly_return,
        label: m.month,
        color: m.monthly_return >= 0 ? HIST_POS : HIST_NEG,
    }));
    waitForCharts(() => initBarChart('tv-monthly-chart', data, {
        bargap: 0.18,
        // Unified hover already shows the month — only emit the return
        hoverTemplate: '%{y:.2%}<extra></extra>',
        yaxis: { tickformat: '.0%' },
        xaxis: {
            type: 'date',
            tickformat: narrow ? '%y-%m' : '%Y-%m',
            hoverformat: '%Y-%m',
            nticks: narrow ? 4 : 10,
            tickangle: narrow ? -45 : 0,
            tickfont: { size: narrow ? 10 : 11 },
        },
        margin: { l: 44, r: 10, t: 16, b: narrow ? 60 : 48 },
        height: narrow ? 260 : 300,
        errorMsg: 'Failed to render monthly returns. Please refresh.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}

function initReturnDistChart() {
    const container = document.getElementById('tv-return-dist-chart');
    const raw = tvReturnDistData || [];
    if (!raw.length) return;
    const pcts = raw.map(d => Number(d.pct));
    const minPct = Math.min(...pcts);
    const maxPct = Math.max(...pcts);
    const pad = Math.max(2, (maxPct - minPct) * 0.04);
    const data = raw.map(d => ({
        x: d.pct,
        y: d.value,
        label: `${Number(d.pct).toFixed(1)}%`,
        color: d.pct >= 0 ? HIST_POS : HIST_NEG,
    }));
    waitForCharts(() => initBarChart('tv-return-dist-chart', data, {
        bargap: 0.06,
        // Unified hover already shows the bin — only emit the count
        hoverTemplate: 'Count: %{y}<extra></extra>',
        yaxis: { tickformat: 'd' },
        xaxis: {
            type: 'linear',
            ticksuffix: '%',
            tickformat: '.0f',
            range: [minPct - pad, maxPct + pad],
        },
        margin: { l: 48, r: 12, t: 18, b: 42 },
        errorMsg: 'Failed to render return distribution.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}
