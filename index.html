            --font-mono: 'Aeonik Mono', ui-monospace, monospace;
            --font-fono: 'Aeonik Fono', 'Segoe UI', sans-serif;

        strong, b { font-weight: 700; }
        .top-banner {

        .hero::after {

        .hero-kicker {

        .hero h1 {

        .panel-padded { padding: 1.35rem 1.4rem; }
        .section-block { margin-bottom: 2rem; }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.9rem;
            gap: 1rem;
        }
        .section-title {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;

            font-size: 1.1rem;

        .metric-grid {

        @media (min-width: 1024px) { .metric-grid.performance-grid { grid-template-columns: repeat(4, 1fr); } }
        .metric-card {

        #signals-container .metric-card {

        #signals-container .metric-value {

        .val-pos { color: var(--pos); }
        .val-neg { color: var(--neg); }
        .val-neutral { color: var(--text-muted); }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }
        .data-table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }
        .data-table th {
            text-align: left;
            padding: 0.7rem 0.75rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.02em;
            border-bottom: 1.5px solid var(--ink);
            background: var(--surface-muted);
            white-space: nowrap;
            vertical-align: middle;
            line-height: 1.2;
        }
        .data-table th:not(:first-child) { text-align: right; }
        .data-table td {
            padding: 0.8rem 0.75rem;
            border-bottom: 1px solid var(--border-soft);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            vertical-align: middle;
            line-height: 1.2;
        }
        .data-table td:not(:first-child) { text-align: right; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tbody tr:hover { background: rgba(151, 212, 255, 0.18); }
        .data-table .row-highlight { background: rgba(255, 222, 0, 0.28); }
        .data-table .row-highlight:hover { background: rgba(255, 222, 0, 0.4); }
        .data-table th:first-child,
        .data-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 1;
            width: 1%;
            max-width: 7.5rem;
            background: var(--surface);
            box-shadow: 1px 0 0 var(--border-soft);
        }
        .data-table thead th:first-child { background: var(--surface-muted); z-index: 2; }
        .data-table .row-highlight td:first-child { background: #fff6a8; }
        .data-table tbody tr:hover td:first-child { background: #e8f5ff; }
        .data-table .row-highlight:hover td:first-child { background: #ffe96a; }
        /* Compact holdings book: no sticky overlay, ticker fits content */
        .holdings-table { min-width: 0; table-layout: auto; }
        .holdings-table th:first-child,
        .holdings-table td:first-child {
            position: static;
            left: auto;
            z-index: auto;
            width: 1%;
            max-width: none;
            box-shadow: none;
            padding-right: 0.5rem;
        }
        .holdings-table thead th:first-child { z-index: auto; }
        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1px solid var(--ink);
            margin-right: 0.5rem;
            vertical-align: middle;
            flex-shrink: 0;
        }
        .data-table .name-cell {
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }
        .chart-panel {
            position: relative;
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            padding: 1rem;
        }
        .chart-tooltip {
            position: absolute;
            z-index: 5;
            display: none;
            pointer-events: none;
            min-width: 120px;
            max-width: 260px;
            padding: 8px 10px;
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: var(--radius);
            box-shadow: var(--shadow-hard-sm);
            font-family: var(--font-mono);
            font-size: 11px;
            line-height: 1.45;
            color: var(--ink);
            white-space: nowrap;

        .chart-tooltip .tt-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            border: 1px solid var(--ink);
            flex-shrink: 0;
        }
        .chart-tooltip .tt-name {
            color: var(--text-muted);
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chart-tooltip .tt-val {
            font-variant-numeric: tabular-nums;
            font-weight: 600;
        }
        .mtd-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            font-weight: 400;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
            line-height: 1;
            min-height: 1.5rem;
        }

            flex-wrap: wrap;
            align-items: center;
            gap: 0.65rem 0.85rem;
            margin-bottom: 1.25rem;
        }
        .year-btn-row {

            flex-wrap: wrap;
            align-items: center;
            gap: 0.45rem;
        }
        #year-return-display {
            display: inline-flex;
            align-items: center;
            min-height: 28.8px;
            line-height: 1;

        /* MotherDuck docs "Copy" button style */
        .year-btn {

        .month-card {

        .ret-badge {

        <script>
        // Frontend logic: render dynamic content from #report-data and init charts.
const DATA = JSON.parse(document.getElementById('report-data').textContent);

const annualReturns = DATA.annual_returns;
const tvEquityData = DATA.tv_equity_series;
const chartColors = DATA.colors_map;
const tvDrawdownSeries = DATA.tv_drawdown_series;
const tvMonthlyData = DATA.tv_monthly_data;
const tvReturnDistData = DATA.tv_return_dist_data;
const tvCurrentMonthCurve = DATA.tv_current_month_curve;
const defaultYear = DATA.default_year;
const STRATEGY_KEY = 'Strategy';

// ===== Number formatting (matches Python) =====
function fmtPct(v) {
    return (v * 100).toFixed(1) + '%';
}

// ===== Header + next-session signals =====
function renderHeader() {
    document.getElementById('date-range').textContent = DATA.date_range;
    document.getElementById('signal-asof').textContent = DATA.asof_date_str;
    document.getElementById('signal-next-date').textContent = DATA.next_date_str;

    const container = document.getElementById('signals-container');
    if (DATA.next_picks && DATA.next_picks.length > 0) {
        const cards = DATA.next_picks.map(p =>
            `<div class="metric-card" style="text-align:center;">
                <div class="metric-value" style="font-size:1.25rem;">${p.ticker}</div>
                <div class="metric-label" style="margin-top:0.5rem;">Score ${((p.total_score ?? 0) * 100).toFixed(1)}</div>
            </div>`
        ).join('');
        container.innerHTML = `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">${cards}</div>`;
    } else {
        container.innerHTML =
            `<div class="empty-state">In cash (QQQ 50MA &lt; 200MA) or no eligible picks</div>`;
    }
}

// ===== KPI cards =====
function renderKPIs() {
    const container = document.getElementById('kpi-container');
    container.innerHTML = DATA.performance_kpis.map(k =>
        `<div class="metric-card">
            <div class="metric-label">${k.label}</div>
            <div class="metric-value ${k.text_color}">${k.value}</div>
        </div>`
    ).join('');
}

// ===== Strategy vs benchmarks table =====
function sharpeColorClass(sharpeStr) {
    const n = parseFloat(sharpeStr);
    if (Number.isNaN(n)) return 'val-neutral';
    return n >= 1 ? 'val-pos' : 'val-neg';
}

function returnColorClass(ret) {
    if (ret > 0) return 'val-pos';
    if (ret < 0) return 'val-neg';
    return 'val-neutral';
}

function retBadgeClass(ret) {
    if (ret > 0) return 'ret-badge-pos';
    if (ret < 0) return 'ret-badge-neg';
    return 'ret-badge-flat';
}

function renderComparison() {
    const tbody = document.getElementById('comparison-tbody');
    tbody.innerHTML = DATA.comparison_rows.map(r =>
        `<tr class="${r.row_cls}">
            <td class="font-medium"><span class="name-cell"><span class="legend-dot" style="background:${r.dot_color}"></span>${r.name}</span></td>
            <td class="${r.ret_cls}">${r.total_return}</td>
            <td class="${r.cagr_cls}">${r.cagr}</td>
            <td class="val-neg">${r.max_drawdown}</td>
            <td class="${sharpeColorClass(r.sharpe)}">${r.sharpe}</td>
            <td class="val-neutral">${r.win_rate}</td>
        </tr>`
    ).join('');
}

function formatMonthLabel(ym) {
    if (!ym || typeof ym !== 'string') return 'This Month';
    const parts = ym.split('-');
    if (parts.length < 2) return ym;
    const months = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];
    const mi = parseInt(parts[1], 10) - 1;
    if (mi < 0 || mi > 11) return ym;
    return months[mi];
}

// ===== Current month: title, MTD badge, holdings =====
function renderCurrentMonth() {
    const title = document.getElementById('current-month-title');
    if (title) title.textContent = `${formatMonthLabel(DATA.current_month)} so far`;

    const badge = document.getElementById('current-month-badge');
    if (badge) {
        const curve = tvCurrentMonthCurve || [];
        if (curve.length === 0) {
            badge.innerHTML = '';
        } else {
            const val = curve[curve.length - 1].value * 100;
            const cls = val >= 0 ? 'val-pos' : 'val-neg';
            badge.innerHTML = `<span class="${cls}">${(val >= 0 ? '+' : '') + val.toFixed(2)}%</span>`;
        }
    }

    const container = document.getElementById('current-month-cards');
    if (!container) return;

    const holdings = DATA.current_month_holdings || [];
    if (holdings.length === 0) {
        container.innerHTML =
            `<div class="empty-state">In cash this month, or no holdings yet</div>`;
        return;
    }

    const rows = holdings.map(d => {
        const tRetClass = returnColorClass(d.monthly_return);
        const tRetStr = (d.monthly_return * 100 >= 0 ? '+' : '') + (d.monthly_return * 100).toFixed(2) + '%';
        const scoreStr = ((d.total_score ?? 0) * 100).toFixed(1);
        return `<tr>
            <td class="font-medium">${d.ticker}</td>
            <td class="val-neutral">${scoreStr}</td>
            <td class="${tRetClass}">${tRetStr}</td>
            <td>${d.buy_price.toFixed(2)}</td>
            <td>${d.sell_price.toFixed(2)}</td>
        </tr>`;
    }).join('');

    container.innerHTML = `<div class="panel table-scroll">
        <table class="data-table holdings-table">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Score</th>
                    <th>Return</th>
                    <th>Entry</th>
                    <th>Last</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;
}

let selectedYear = '';

// ===== Year filter + monthly cards =====
function renderYearButtons() {
    const row = document.getElementById('year-btn-row');
    if (!row) return;
    const years = DATA.years || [];
    selectedYear = years.includes(defaultYear) ? defaultYear : (years[0] || '');
    row.innerHTML = years.map(y =>
        `<button type="button" class="year-btn${y === selectedYear ? ' is-active' : ''}" data-year="${y}" aria-pressed="${y === selectedYear}">${y}</button>`
    ).join('');
    row.querySelectorAll('.year-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            selectedYear = btn.dataset.year;
            row.querySelectorAll('.year-btn').forEach(b => {
                const active = b.dataset.year === selectedYear;
                b.classList.toggle('is-active', active);
                b.setAttribute('aria-pressed', active ? 'true' : 'false');
            });
            filterByYear();
        });
    });
}

function renderMonthlyCards() {
    renderYearButtons();

    const container = document.getElementById('monthly-cards');
    container.innerHTML = DATA.monthly_data.map(m => {
        const retClass = retBadgeClass(m.monthly_return);
        const retStr = (m.monthly_return * 100 >= 0 ? '+' : '') + (m.monthly_return * 100).toFixed(2) + '%';
        const details = DATA.details_by_month[m.month] || [];
        let tableHtml;
        if (details.length > 0) {
            const rows = details.map(d => {
                const tRetClass = returnColorClass(d.monthly_return);
                const tRetStr = (d.monthly_return * 100 >= 0 ? '+' : '') + (d.monthly_return * 100).toFixed(2) + '%';
                return `<tr>
                    <td class="font-medium">${d.ticker}</td>
                    <td>${d.buy_price.toFixed(2)}</td>
                    <td>${d.sell_price.toFixed(2)}</td>
                    <td class="${tRetClass}">${tRetStr}</td>
                </tr>`;
            }).join('');
            const padCount = Math.max(0, 5 - details.length);
            const padRows = Array.from({ length: padCount }, () =>
                '<tr class="month-card-pad"><td>—</td><td>—</td><td>—</td><td>—</td></tr>'
            ).join('');
            tableHtml = `<table>
                <thead><tr><th>Ticker</th><th>Entry</th><th>Exit</th><th>Return</th></tr></thead>
                <tbody>${rows}${padRows}</tbody>
            </table>`;
        } else {
            // Cash placeholder: elegant centered design with icon-like element
            tableHtml = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:158px;padding:1.5rem 1rem;gap:0.75rem;">
                <div style="width:3rem;height:3rem;border-radius:50%;background:var(--surface-muted);border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:1.5rem;">💵</div>
                <div style="font-family:var(--font-mono);font-size:0.875rem;color:var(--text-muted);letter-spacing:0.02em;">Cash Position</div>
                <div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-subtle);text-align:center;">No holdings this month</div>
            </div>`;
        }
        return `<div class="month-card" data-year="${m.year}" data-month="${m.month}">
            <div class="month-card-head">
                <div>
                    <div class="font-semibold text-[13px] tracking-tight">${m.month}</div>
                    <div class="text-[10px] text-zinc-400 mt-0.5">${m.buy_date} → ${m.sell_date}</div>
                </div>
                <div class="ret-badge ${retClass}">${retStr}</div>
            </div>
            ${tableHtml}
        </div>`;
    }).join('');
}

// Soft green / red tuned to the warm cream page (less neon than default UI greens/reds)
const HIST_POS = '#5a9e6f';
const HIST_NEG = '#d96b5c';

const TV_BASE = {
    layout: { background: { color: 'transparent' }, textColor: '#6b6560', fontSize: 11, fontFamily: 'Aeonik Mono, monospace' },
    grid: { vertLines: { color: 'rgba(56,56,56,0.08)' }, horzLines: { color: 'rgba(56,56,56,0.08)' } },
    timeScale: { borderColor: 'rgba(56,56,56,0.22)', timeVisible: false, secondsVisible: false },
    crosshair: {
        mode: 0,
        vertLine: { color: 'rgba(56,56,56,0.28)', width: 1, style: 3 },
        horzLine: { color: 'rgba(56,56,56,0.28)', width: 1, style: 3 },
    },
};

// Hide the horizontal dashed line / label that tracks the series' latest value
const SERIES_NO_LAST_PRICE = {
    priceLineVisible: false,
    lastValueVisible: false,
};

function createTVChart(container, height, extra = {}) {
    if (!container || typeof LightweightCharts === 'undefined') return null;
    return LightweightCharts.createChart(container, {
        width: container.clientWidth || 800,
        height: container.clientHeight || height,
        ...TV_BASE,
        rightPriceScale: { borderColor: 'rgba(56,56,56,0.22)', ...(extra.rightPriceScale || {}) },
        ...extra,
    });
}

function bindChartResize(chart, container, height) {
    const resize = () => chart.resize(container.clientWidth || 800, container.clientHeight || height);
    window.addEventListener('resize', resize);
    setTimeout(() => { resize(); try { chart.timeScale().fitContent(); } catch(e) {} }, 80);
}

function showChartError(container, msg) {
    container.innerHTML = `<div style="padding:12px;color:#b91c1c;font-size:12px;background:#fef2f2;border-radius:6px;">${msg}</div>`;
}

function fmtSignedPct(v, digits = 2) {
    const pct = v * 100;
    return (pct >= 0 ? '+' : '') + pct.toFixed(digits) + '%';
}

// Right-axis labels for series stored as fractions (0.05 → 5.0%)
const PCT_PRICE_FORMAT = {
    type: 'custom',
    minMove: 0.0001,
    formatter: (price) => (price * 100).toFixed(1) + '%',
};

function fmtChartTime(time) {
    if (time == null) return '';
    if (typeof time === 'string') return time.length >= 10 ? time.slice(0, 10) : time;
    if (typeof time === 'object' && time.year != null) {
        const m = String(time.month).padStart(2, '0');
        const d = String(time.day).padStart(2, '0');
        return `${time.year}-${m}-${d}`;
    }
    if (typeof time === 'number' && time > 1e9) {
        const d = new Date(time * 1000);
        if (!Number.isNaN(d.getTime())) return d.toISOString().slice(0, 10);
    }
    return String(time);
}

function attachChartTooltip(chart, container, seriesEntries, options = {}) {

    if (getComputedStyle(host).position === 'static') host.style.position = 'relative';

    let tooltip = host.querySelector(':scope > .chart-tooltip');
    if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.className = 'chart-tooltip';
        host.appendChild(tooltip);
    }

    const formatTime = options.formatTime || fmtChartTime;
    const formatValue = options.formatValue || ((v) => (typeof v === 'number' ? v.toFixed(2) : String(v)));

    chart.subscribeCrosshairMove((param) => {
        if (
            !param ||
            param.time === undefined ||
            !param.point ||
            param.point.x < 0 ||
            param.point.y < 0 ||
            param.point.x > container.clientWidth ||
            param.point.y > container.clientHeight
        ) {
            tooltip.style.display = 'none';
            return;
        }

        const rows = [];
        for (const entry of seriesEntries) {
            const raw = param.seriesData.get(entry.series);
            if (!raw || raw.value === undefined) continue;
            const color = raw.color
                || entry.color
                || (typeof entry.series.options === 'function' ? entry.series.options().color : null)
                || '#6b7280';
            const name = entry.name || '';
            const valFmt = entry.formatValue || formatValue;
            rows.push(
                `<div class="tt-row">` +
                `<span class="tt-dot" style="background:${color}"></span>` +
                (name ? `<span class="tt-name">${name}</span>` : '') +
                `<span class="tt-val">${valFmt(raw.value, param.time, raw)}</span>` +
                `</div>`
            );
        }
        if (rows.length === 0) {
            tooltip.style.display = 'none';
            return;
        }

        tooltip.innerHTML = `<div class="tt-time">${formatTime(param.time)}</div>${rows.join('')}`;
        tooltip.style.display = 'block';

        const pad = 12;
        const tipW = tooltip.offsetWidth;
        const tipH = tooltip.offsetHeight;
        const hostRect = host.getBoundingClientRect();
        const contRect = container.getBoundingClientRect();
        let left = (contRect.left - hostRect.left) + param.point.x + pad;
        let top = (contRect.top - hostRect.top) + param.point.y + pad;
        if (left + tipW > host.clientWidth - 4) left = (contRect.left - hostRect.left) + param.point.x - tipW - pad;
        if (top + tipH > host.clientHeight - 4) top = (contRect.top - hostRect.top) + param.point.y - tipH - pad;
        if (left < 4) left = 4;
        if (top < 4) top = 4;
        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
    });
}

function initMultiLineChart(containerId, seriesMap, options = {}) {
    const container = document.getElementById(containerId);
    if (!container || !seriesMap || Object.keys(seriesMap).length === 0) return;
    const height = options.height || 240;
    try {
        const chart = createTVChart(container, height, options.chartOpts || {});
        if (!chart || typeof chart.addLineSeries !== 'function') {
            showChartError(container, options.errorMsg || 'Chart failed to initialize');
            return;
        }
        const seriesEntries = [];
        Object.keys(seriesMap).forEach(name => {
            const data = seriesMap[name];
            if (!data || data.length === 0) return;
            const lw = options.lineWidth ? options.lineWidth(name) : (name === STRATEGY_KEY ? 2 : 1.5);
            const color = chartColors[name] || '#6b7280';
            const seriesOpts = { color, lineWidth: lw, title: name, ...SERIES_NO_LAST_PRICE };
            if (options.priceFormat) seriesOpts.priceFormat = options.priceFormat;
            const series = chart.addLineSeries(seriesOpts);
            series.setData(data);
            seriesEntries.push({ series, name, color });
        });
        bindChartResize(chart, container, height);
        attachChartTooltip(chart, container, seriesEntries, {
            formatValue: options.formatValue,
            formatTime: options.formatTime,
        });
    } catch (err) {
        console.error(containerId, err);
        showChartError(container, options.errorMsg || 'Chart failed to render');
    }
}

function initHistogramChart(containerId, data, options = {}) {
    const container = document.getElementById(containerId);
    if (!container || !data || data.length === 0) return;
    const height = options.height || 240;
    try {
        const chart = createTVChart(container, height, options.chartOpts || {});
        const histOpts = { title: options.title || '', color: options.color, ...SERIES_NO_LAST_PRICE };
        if (options.priceFormat) histOpts.priceFormat = options.priceFormat;
        const series = chart.addHistogramSeries(histOpts);
        series.setData(data);
        bindChartResize(chart, container, height);
        attachChartTooltip(chart, container, [{
            series,
            name: options.seriesName || options.title || '',
            color: options.color || HIST_POS,
            formatValue: options.formatValue,
        }], {
            formatTime: options.formatTime,
            formatValue: options.formatValue,
        });
    } catch (err) {
        console.error(containerId, err);
        showChartError(container, options.errorMsg || 'Chart failed to render');
    }
}

function waitForCharts(callback, container, failMsg) {
    if (typeof LightweightCharts !== 'undefined' && typeof LightweightCharts.createChart === 'function') {
        callback();
        return;
    }
    let attempts = 0;
    const iv = setInterval(() => {
        attempts++;
        if (typeof LightweightCharts !== 'undefined' && typeof LightweightCharts.createChart === 'function') {
            clearInterval(iv);
            callback();
        } else if (attempts > 12) {
            clearInterval(iv);
            if (container) container.innerHTML = `<div style="padding:12px;color:#666;font-size:12px;">${failMsg}</div>`;
        }
    }, 100);
}

function filterByYear() {
    const year = selectedYear;
    const allCards = Array.from(document.querySelectorAll('#monthly-cards .month-card'));
    const container = document.getElementById('monthly-cards');

    allCards.forEach(card => {
        card.classList.remove('is-visible');
        card.style.display = '';
    });

    let yearCards = [];
    if (year) {
        yearCards = allCards.filter(card => card.dataset.year === year);
        yearCards.sort((a, b) => b.dataset.month.localeCompare(a.dataset.month));
    } else {
        yearCards = allCards;
    }

    yearCards.forEach(card => {
        container.appendChild(card);
        card.classList.add('is-visible');
    });

    const retDisplay = document.getElementById('year-return-display');
    if (retDisplay) {
        if (year && annualReturns[year] !== undefined) {
            const ret = annualReturns[year];
            const retStr = (ret * 100).toFixed(2) + '%';
            const retClass = ret >= 0 ? 'val-pos' : 'val-neg';
            retDisplay.innerHTML = `<span class="${retClass}">Year return ${retStr}</span>`;
        } else {
            retDisplay.innerHTML = '';
        }
    }
}

function initCurrentMonthCurve() {
    const container = document.getElementById('tv-current-month-chart');
    if (!container) return;
    const curve = tvCurrentMonthCurve || [];
    if (curve.length === 0) {
        container.innerHTML = `<div style="padding:12px;color:var(--text-muted);font-size:12px;">No holdings data for this month</div>`;
        return;
    }
    const last = curve[curve.length - 1]?.value ?? 0;
    const lineColor = last >= 0 ? HIST_POS : HIST_NEG;
    waitForCharts(() => {
        if (typeof LightweightCharts === 'undefined') return;
        try {
            const chart = createTVChart(container, 260);
            if (!chart || typeof chart.addLineSeries !== 'function') {
                showChartError(container, 'Failed to render this month\'s return curve. Please refresh.');
                return;
            }
            const series = chart.addLineSeries({
                color: lineColor,
                lineWidth: 2,
                title: '',
                priceFormat: PCT_PRICE_FORMAT,
                ...SERIES_NO_LAST_PRICE,
            });
            series.setData(curve);
            bindChartResize(chart, container, 260);
            attachChartTooltip(chart, container, [{
                series,
                name: 'MTD',
                color: lineColor,
                formatValue: (v) => fmtSignedPct(v),
            }]);
        } catch (err) {
            console.error('tv-current-month-chart', err);
            showChartError(container, 'Failed to render this month\'s return curve. Please refresh.');
        }
    }, container, 'Chart library failed to load. Check your network and refresh.');
}

function initTradingViewEquity() {
    const container = document.getElementById('tv-equity-chart');
    waitForCharts(() => initMultiLineChart('tv-equity-chart', tvEquityData, {
        height: 400,
        lineWidth: (name) => name === STRATEGY_KEY ? 3 : 2,
        chartOpts: { rightPriceScale: { scaleMargins: { top: 0.1, bottom: 0.1 } }, legend: { visible: true, position: 'top' } },
        formatValue: (v) => v.toFixed(3),
        errorMsg: 'Failed to render equity curve. Please refresh.',
    }), container, 'Chart library failed to load. Check your network and refresh.');
}

function initTradingViewDrawdown() {
    initMultiLineChart('tv-drawdown-chart', tvDrawdownSeries, {
        priceFormat: PCT_PRICE_FORMAT,
        formatValue: (v) => fmtSignedPct(v),
        errorMsg: 'Failed to render drawdown chart. Please refresh.',
    });
}

function initTradingViewMonthly() {
    const coloredData = tvMonthlyData.map(d => ({ time: d.time, value: d.value, color: d.value >= 0 ? HIST_POS : HIST_NEG }));
    initHistogramChart('tv-monthly-chart', coloredData, {
        title: '',
        seriesName: 'Return',
        priceFormat: PCT_PRICE_FORMAT,
        formatValue: (v) => fmtSignedPct(v),
        formatTime: (time) => {
            const s = fmtChartTime(time);
            return s.length >= 7 ? s.slice(0, 7) : s;
        },
        errorMsg: 'Failed to render monthly returns. Please refresh.',
    });
}

function initTradingViewReturnDist() {
    const coloredData = tvReturnDistData.map(d => ({
        time: d.time,
        value: d.value,
        color: ((d.time - 100000) / 100) >= 0 ? HIST_POS : HIST_NEG,
    }));
    initHistogramChart('tv-return-dist-chart', coloredData, {
        title: '',
        seriesName: 'Count',
        chartOpts: { timeScale: { ...TV_BASE.timeScale, tickMarkFormatter: (time) => ((time - 100000) / 100).toFixed(1) + '%' } },
        formatTime: (time) => {
            const t = typeof time === 'number' ? time : Number(time);
            return ((t - 100000) / 100).toFixed(1) + '%';
        },
        formatValue: (v) => String(Math.round(v)),
        errorMsg: 'Failed to render return distribution.',
    });
}

function initializeAll() {
    renderHeader();
    renderKPIs();
    renderComparison();
    renderCurrentMonth();
    renderMonthlyCards();
    filterByYear();
    setTimeout(initCurrentMonthCurve, 100);
    setTimeout(initTradingViewEquity, 120);
    setTimeout(initTradingViewDrawdown, 150);
    setTimeout(initTradingViewMonthly, 150);
    setTimeout(initTradingViewReturnDist, 180);
}

initializeAll();
